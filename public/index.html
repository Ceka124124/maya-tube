<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Film Odasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --bg:#05060f;--s1:rgba(7,9,20,.9);--s2:rgba(10,12,26,.95);
  --brd:rgba(110,60,240,.18);--acc:#6d28d9;--acc2:#a78bfa;
  --gold:#f59e0b;--rose:#f43f5e;--cyan:#22d3ee;--grn:#34d399;
  --txt:#e8eaf6;--mut:#6b7280;--glow:rgba(109,40,217,.35);
  --r:cubic-bezier(.16,1,.3,1);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --hh:48px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--txt);touch-action:manipulation}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--acc);border-radius:2px}
input,textarea,select{outline:none;-webkit-appearance:none;font-family:inherit;color:var(--txt);background:none}
button{border:none;cursor:pointer;-webkit-appearance:none;font-family:inherit;color:inherit;background:none}

/* ── BACKGROUND ── */
#bgLayer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,#1a0840 0%,#05060f 70%)}
#bgVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;pointer-events:none;opacity:.5}
#bgImg{position:absolute;inset:0;background-size:cover;background-position:center;display:none;opacity:.45;pointer-events:none}
#bgLayer::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 20%,rgba(5,6,15,.75) 100%);pointer-events:none}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s,transform .5s}
#loader.gone{opacity:0;transform:scale(1.05);pointer-events:none}
.ld-logo{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,6vw,30px);background:linear-gradient(135deg,var(--acc2),var(--gold),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.5s infinite;background-size:200%}
@keyframes shimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.ld-strip{display:flex;gap:5px;margin-bottom:4px}
.ld-f{width:8px;height:12px;border:2px solid var(--acc2);border-radius:3px;animation:ff .45s infinite alternate}
.ld-f:nth-child(2n){animation-delay:.1s}.ld-f:nth-child(3n){animation-delay:.2s}
@keyframes ff{from{opacity:.2;transform:scaleY(.6)}to{opacity:1;transform:scaleY(1)}}
.ld-bar{width:180px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;transition:width .12s}
.ld-sub{font-family:'Exo 2';font-size:9px;color:var(--mut);letter-spacing:.22em}

/* ── JOIN ── */
#joinScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:18px;transition:opacity .35s,transform .35s}
#joinScreen.gone{opacity:0;transform:scale(1.05);pointer-events:none}
.jp{position:absolute;border-radius:50%;pointer-events:none;animation:jfloat linear infinite}
@keyframes jfloat{0%{transform:translateY(105vh) rotate(0);opacity:0}8%{opacity:.5}90%{opacity:.3}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.jcard{background:rgba(10,12,25,.93);border:1px solid var(--brd);border-radius:22px;padding:26px 22px;width:min(420px,100%);box-shadow:0 0 70px rgba(109,40,217,.18);backdrop-filter:blur(24px);display:flex;flex-direction:column;gap:14px}
.jlogo{font-family:'Cinzel Decorative',serif;font-size:clamp(14px,4.5vw,24px);background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;animation:shimmer 3s infinite;background-size:200%;line-height:1.3}
.jsub{font-family:'Exo 2';font-size:9px;color:var(--mut);letter-spacing:.2em;text-align:center;margin-top:-8px}
.jf{display:flex;flex-direction:column;gap:5px}
.jf label{font-family:'Exo 2';font-size:9px;color:var(--mut);font-weight:700;letter-spacing:.1em;display:flex;align-items:center;gap:5px}
.jf label i{font-size:10px;color:var(--acc2)}
.jin{background:rgba(255,255,255,.055);border:1.5px solid var(--brd);border-radius:10px;padding:11px 13px;font-family:'Exo 2';font-size:14px;width:100%;transition:border-color .2s,box-shadow .2s}
.jin:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(167,139,250,.12)}
.jin::placeholder{color:var(--mut)}
.av-row{display:flex;align-items:center;gap:10px}
.av-row .jin{flex:1}
.av-thumb{width:42px;height:42px;border-radius:50%;border:2px solid var(--brd);overflow:hidden;flex-shrink:0;background:rgba(70,30,110,.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--acc2);font-family:'Exo 2'}
.av-thumb img{width:100%;height:100%;object-fit:cover;display:none}
.admin-note{font-family:'Exo 2';font-size:10px;color:var(--gold);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:7px 10px;display:none;align-items:center;gap:6px}
.admin-note.show{display:flex}
.jbtn{background:linear-gradient(135deg,var(--acc),var(--acc2),var(--gold));background-size:200%;animation:shimmer 3s infinite;border-radius:12px;padding:13px;color:#fff;font-family:'Cinzel Decorative',serif;font-size:13px;transition:transform .15s,box-shadow .15s;letter-spacing:.04em}
.jbtn:active{transform:scale(.97);box-shadow:0 8px 28px rgba(167,139,250,.45)}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;height:100dvh}

/* ── HEADER ── */
#hdr{flex-shrink:0;height:calc(var(--hh) + var(--st));padding-top:var(--st);background:var(--s1);border-bottom:1px solid var(--brd);backdrop-filter:blur(22px);display:flex;align-items:center;gap:7px;padding-inline:11px;box-shadow:0 2px 24px rgba(109,40,217,.1);position:relative;z-index:50}
.hlogo{font-family:'Cinzel Decorative',serif;font-size:12px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0}
.hname{font-family:'Exo 2';font-size:9px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.hsp{flex:1}
.hlive{display:flex;align-items:center;gap:3px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.28);border-radius:10px;padding:3px 7px;font-size:8px;color:var(--rose);font-weight:700;letter-spacing:.08em;flex-shrink:0}
.hdot{width:4px;height:4px;border-radius:50%;background:var(--rose);animation:dp 1.2s infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.2}}
.hcnt{font-size:9px;color:var(--mut);display:flex;align-items:center;gap:3px;flex-shrink:0}
.hbtn{background:rgba(109,40,217,.18);border:1px solid var(--brd);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--txt);transition:all .15s;flex-shrink:0}
.hbtn:active{transform:scale(.91);background:rgba(109,40,217,.35)}
.hbtn.red{background:rgba(244,63,94,.14);border-color:rgba(244,63,94,.28);color:var(--rose)}
.hbtn.gold{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.3);color:var(--gold)}
#myAvBtn{width:28px;height:28px;border-radius:50%;border:2px solid var(--brd);overflow:hidden;flex-shrink:0;background:rgba(70,30,110,.6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--acc2);font-family:'Exo 2';cursor:pointer;transition:border-color .2s}
#myAvBtn:active{transform:scale(.9)}
#myAvBtn img{width:100%;height:100%;object-fit:cover;display:none}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
@media(min-width:768px){
  #main{flex-direction:row}
  #videoPane{width:clamp(280px,50%,600px);flex-shrink:0;border-right:1px solid var(--brd)}
  #playerWrap{height:auto!important;aspect-ratio:16/9}
  #chatPane{flex:1;min-width:0}
}

/* ── VIDEO PANE ── */
#videoPane{flex-shrink:0;display:flex;flex-direction:column;background:rgba(5,6,15,.6)}
#playerWrap{height:clamp(150px,32vh,290px);position:relative;background:#000;overflow:hidden;flex-shrink:0}
#playerWrap iframe,#playerWrap video{position:absolute;inset:0;width:100%;height:100%;border:0}
#placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:radial-gradient(ellipse at center,#160430,#05060f)}
.ph-ic{font-size:40px;color:var(--acc2);opacity:.16;animation:flt 4s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ph-t{font-family:'Cinzel Decorative';font-size:10px;color:var(--mut);opacity:.38;text-align:center;padding:0 20px}

#vidBar{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 9px;background:rgba(5,6,15,.86);border-bottom:1px solid var(--brd);min-height:30px}
#vidTitle{font-family:'Exo 2';font-size:10px;color:var(--txt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.75}
.vbadge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:'Exo 2';flex-shrink:0}
.vbyt{background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.3);color:#ff7070}
.vbmp4{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.28);color:var(--cyan)}
.vbok{background:rgba(255,136,0,.1);border:1px solid rgba(255,136,0,.3);color:#ffaa44}
.vbrt{background:rgba(110,65,255,.15);border:1px solid rgba(110,65,255,.3);color:var(--acc2)}
.vsm{font-size:11px;color:var(--mut);padding:3px 5px;border-radius:5px;background:rgba(255,255,255,.04);flex-shrink:0;transition:all .14s}
.vsm:active{background:rgba(255,255,255,.14);color:var(--acc2)}

#adminCtrl{display:none;flex-shrink:0;padding:5px 8px;gap:4px;background:rgba(5,6,15,.92);border-bottom:1px solid var(--brd)}
#adminCtrl.show{display:flex;align-items:center}
#vName{width:80px;flex-shrink:0;font-family:'Exo 2';font-size:11px;background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:7px;padding:6px 8px}
#vUrl{flex:1;min-width:0;font-family:'Exo 2';font-size:11px;background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:7px;padding:6px 8px}
#vName:focus,#vUrl:focus{border-color:var(--acc2);outline:none}
#vName::placeholder,#vUrl::placeholder{color:var(--mut)}
.vcbtn{flex-shrink:0;background:rgba(109,40,217,.22);border:1px solid var(--brd);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--txt);transition:all .14s}
.vcbtn:active{transform:scale(.91)}

/* ── SEATS ── */
#seatsArea{flex-shrink:0;background:rgba(5,6,15,.8);border-bottom:1px solid var(--brd);padding:12px 10px 10px}
.slbl{font-family:'Exo 2';font-size:8px;color:var(--mut);letter-spacing:.14em;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:5px}
.slbl i{color:var(--acc2);font-size:10px}
#seatRow{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
#seatRow::-webkit-scrollbar{display:none}

.seat{flex-shrink:0;width:50px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;margin-top:46px;user-select:none}
.seat-av{position:absolute;top:-44px;left:50%;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;overflow:hidden;background:rgba(60,20,100,.85);border:2px solid rgba(100,50,180,.4);display:none;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc2);font-family:'Exo 2'}
.seat-av img{width:100%;height:100%;object-fit:cover;display:none}
.seat-mic{position:absolute;top:-58px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--grn);display:none}
.seat-mic i{animation:mw 1.4s ease-in-out infinite}
@keyframes mw{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.seat-uname{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--txt);font-family:'Exo 2';white-space:nowrap;max-width:54px;overflow:hidden;text-overflow:ellipsis;text-align:center;display:none}
.seat-back{width:44px;height:30px;background:linear-gradient(155deg,rgba(55,15,90,.75),rgba(35,8,65,.88));border-radius:7px 7px 3px 3px;border:1px solid rgba(90,40,150,.4);display:flex;align-items:center;justify-content:center;transition:all .2s}
.seat-num{font-size:9px;color:rgba(167,139,250,.5);font-weight:700;font-family:'Exo 2'}
.seat-cush{width:44px;height:9px;background:linear-gradient(180deg,rgba(75,28,120,.8),rgba(50,15,90,.75));border-radius:0 0 5px 5px;border:1px solid rgba(90,40,150,.4);border-top:none}
.seat-legs{display:flex;gap:22px;margin-top:2px}
.seat-leg{width:4px;height:7px;background:rgba(75,30,130,.5);border-radius:2px}
.seat:hover .seat-back{border-color:rgba(167,139,250,.6);background:linear-gradient(155deg,rgba(80,25,130,.82),rgba(55,12,110,.92))}
.seat.occ .seat-back{border-color:rgba(167,139,250,.7);background:linear-gradient(155deg,rgba(85,28,140,.88),rgba(60,14,120,.92));box-shadow:0 0 14px rgba(167,139,250,.2)}
.seat.mine .seat-back{border-color:rgba(245,158,11,.85);box-shadow:0 0 20px rgba(245,158,11,.28)}
.seat.occ .seat-av{display:flex}
.seat.occ .seat-uname{display:block}
.seat.voice .seat-mic{display:block}

/* ── CHAT PANE ── */
#chatPane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:rgba(5,6,15,.74);backdrop-filter:blur(10px)}

/* User strip */
#userStrip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 9px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--brd);background:rgba(7,8,18,.72);min-height:52px}
#userStrip::-webkit-scrollbar{display:none}
.uitem{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default}
.uitem-av{width:30px;height:30px;border-radius:50%;overflow:hidden;background:rgba(70,28,110,.55);border:2px solid rgba(90,40,150,.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--acc2);font-family:'Exo 2';position:relative;transition:border-color .2s}
.uitem-av img{width:100%;height:100%;object-fit:cover}
.uitem-badge{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;border:1px solid var(--bg);background:rgba(5,6,15,.9)}
.uitem-name{font-family:'Exo 2';font-size:7px;color:var(--mut);max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.uitem.au .uitem-av{border-color:var(--gold)}
.uitem.vu .uitem-av{border-color:var(--acc2)}
.uitem.vou .uitem-av{border-color:var(--grn);box-shadow:0 0 8px rgba(52,211,153,.38)}
.uitem.su .uitem-av{border-color:rgba(167,139,250,.7)}

/* Chat body */
#chatBody{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(109,40,217,.25) transparent}
.cmsg{padding:6px 9px;border-radius:9px;word-break:break-word;font-family:'Exo 2';font-size:12.5px;line-height:1.45;animation:mi .22s var(--r)}
@keyframes mi{from{opacity:0;transform:translateY(4px)}}
.cmsg.sys{background:rgba(109,40,217,.05);border:1px solid rgba(109,40,217,.11);color:var(--mut);font-style:italic;font-size:10.5px;text-align:center}
.cmsg.gift{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.14);text-align:center}
.cmsg.norm{background:rgba(255,255,255,.018)}
.cmsg.me{background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.16)}
.ctop{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.cav{width:18px;height:18px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(70,28,110,.5);border:1.5px solid rgba(90,40,150,.35);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--acc2)}
.cav img{width:100%;height:100%;object-fit:cover}
.cwho{font-size:10px;font-weight:700;letter-spacing:.03em}
.wa{color:var(--gold)}.wv{color:var(--acc2)}.wu{color:var(--cyan)}.ws{color:var(--mut)}
.ctxt{color:var(--txt);font-size:12.5px}

/* Input area */
#inputArea{flex-shrink:0;padding:6px 8px;padding-bottom:calc(6px + var(--sb));border-top:1px solid var(--brd);background:rgba(5,6,15,.92);display:flex;flex-direction:column;gap:5px}
.qrow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;align-items:center}
.qrow::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;background:rgba(109,40,217,.08);border:1px solid rgba(109,40,217,.2);border-radius:10px;padding:3px 8px;font-size:11px;color:var(--txt);font-family:'Exo 2';cursor:pointer;transition:all .12s;white-space:nowrap}
.qchip:active{background:rgba(109,40,217,.28);transform:scale(.93)}
.irow{display:flex;gap:5px;align-items:flex-end}
#msgIn{flex:1;background:rgba(255,255,255,.055);border:1.5px solid var(--brd);border-radius:9px;padding:8px 11px;font-family:'Exo 2';font-size:13.5px;resize:none;max-height:76px;line-height:1.4;transition:border-color .15s}
#msgIn:focus{border-color:var(--acc2)}
#msgIn::placeholder{color:var(--mut)}
.ibtn{flex-shrink:0;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .14s}
.ibtn:active{transform:scale(.88)}
#sendBtn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
#giftBtn{background:rgba(245,158,11,.16);border:1px solid rgba(245,158,11,.28);color:var(--gold)}
#micBtn{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.22);color:var(--mut)}
#micBtn.on{background:rgba(52,211,153,.24);color:var(--grn);border-color:var(--grn)}
#micBtn.dim{opacity:.36;cursor:not-allowed}

/* ── MODALS ── */
.mover{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.76);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mover.open{opacity:1;pointer-events:all}
.mbox{background:var(--s2);border:1px solid var(--brd);border-radius:18px 18px 0 0;padding:16px 18px calc(18px + var(--sb));width:100%;max-width:520px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 44px rgba(109,40,217,.16);transform:translateY(100%);transition:transform .3s var(--r)}
.mover.open .mbox{transform:none}
.mhandle{width:32px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;margin:0 auto 14px}
.mtitle{font-family:'Cinzel Decorative';font-size:15px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.mtitle i{-webkit-text-fill-color:var(--acc2);font-size:14px}
.mf{margin-bottom:11px}
.mf label{display:flex;align-items:center;gap:5px;font-family:'Exo 2';font-size:9px;color:var(--mut);font-weight:700;letter-spacing:.08em;margin-bottom:5px}
.mf label i{font-size:10px;color:var(--acc2)}
.mi{width:100%;background:rgba(255,255,255,.055);border:1px solid var(--brd);border-radius:9px;padding:9px 12px;font-family:'Exo 2';font-size:13px;color:var(--txt);transition:border-color .15s}
.mi:focus{border-color:var(--acc2)}
.mi::placeholder{color:var(--mut)}
.mbrow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.mb{padding:9px 17px;border-radius:9px;font-family:'Rajdhani';font-weight:700;font-size:14px;transition:all .14s}
.mb.p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.mb.p:active{transform:scale(.95)}
.mb.s{background:rgba(255,255,255,.07);color:var(--txt)}
.mb.s:active{background:rgba(255,255,255,.14)}
.echips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.echip{background:rgba(109,40,217,.09);border:1.5px solid var(--brd);border-radius:8px;padding:6px 11px;font-size:11px;cursor:pointer;font-family:'Exo 2';transition:all .13s;color:var(--txt)}
.echip.sel{border-color:var(--acc2);background:rgba(167,139,250,.18);color:var(--acc2)}
.cpr{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.cpc{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .13s;flex-shrink:0}
.cpc:hover,.cpc:active{transform:scale(1.22)}
.ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:7px}
.gcell{text-align:center;padding:9px 5px;border-radius:9px;cursor:pointer;border:1.5px solid var(--brd);background:rgba(255,255,255,.02);transition:all .13s}
.gcell.sel,.gcell:active{border-color:var(--gold);background:rgba(245,158,11,.1)}
.gic{font-size:22px;line-height:1}
.gnm{font-size:9px;color:var(--mut);margin-top:2px;font-family:'Exo 2'}
.ucards{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ucard{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:rgba(255,255,255,.02);border:1px solid transparent;transition:all .14s}
.ucard.ac{border-left:3px solid var(--gold)}
.ucard.vc{border-left:3px solid var(--acc2)}
.uc-av{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(70,28,110,.5);border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc2)}
.uc-av img{width:100%;height:100%;object-fit:cover}
.uc-info{flex:1;min-width:0}
.uc-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uc-meta{font-size:8.5px;color:var(--mut);font-family:'Exo 2';margin-top:1px;display:flex;gap:4px;align-items:center}
.lb{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:var(--gold);font-size:8px;padding:1px 4px;border-radius:4px;font-weight:700}
.uc-acts{display:flex;gap:4px}
.ua{background:rgba(255,255,255,.07);border:none;border-radius:5px;padding:4px 7px;font-size:11px;color:var(--mut);cursor:pointer;transition:background .12s}
.ua:active{background:rgba(255,255,255,.18)}
.ua.d{color:var(--rose)}
.av-prev{width:60px;height:60px;border-radius:50%;border:3px solid var(--brd);overflow:hidden;background:rgba(70,28,110,.5);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--acc2)}
.av-prev img{width:100%;height:100%;object-fit:cover;display:none}

/* ── FX OVERLAY ── */
#fxOv{position:fixed;inset:0;z-index:700;pointer-events:none;overflow:hidden}
.ent-fx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;background:rgba(7,9,18,.92);border:1px solid var(--brd);border-radius:16px;padding:20px 26px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(109,40,217,.35);animation:eIn .45s var(--r),eOut .4s 4.5s forwards}
@keyframes eIn{from{opacity:0;transform:translate(-50%,-50%) scale(.65)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes eOut{to{opacity:0;transform:translate(-50%,-50%) scale(1.06)}}
.ent-ic{font-size:34px;animation:boun .7s ease;display:block;margin-bottom:8px}
@keyframes boun{0%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}
.ent-name{font-family:'Cinzel Decorative';font-size:17px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ent-sub{font-family:'Exo 2';font-size:10px;color:var(--mut);margin-top:5px}
#entVidOv{position:fixed;inset:0;z-index:750;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#entVidOv.show{display:flex}
#entVidEl{max-width:min(520px,90vw);max-height:55vh;border-radius:14px;box-shadow:0 0 70px rgba(109,40,217,.55)}
.evn{font-family:'Cinzel Decorative';font-size:clamp(13px,4vw,22px);background:linear-gradient(135deg,var(--gold),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;padding:0 16px}
.gift-fx{position:absolute;top:28%;left:50%;transform:translateX(-50%);text-align:center;animation:gIn .35s var(--r),gOut .3s 3.6s forwards}
@keyframes gIn{from{opacity:0;transform:translateX(-50%) scale(.4)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes gOut{to{opacity:0;transform:translateX(-50%) translateY(-18px)}}
.gift-big{font-size:52px;animation:gb .5s ease}
@keyframes gb{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.gift-lbl{font-family:'Exo 2';font-size:12px;color:var(--txt);margin-top:6px;background:rgba(7,9,18,.82);padding:4px 10px;border-radius:8px}
.sparkle{position:absolute;pointer-events:none;animation:sp 1.8s forwards}
@keyframes sp{0%{opacity:0;transform:scale(0)}20%{opacity:1;transform:scale(1)}80%{opacity:.6}100%{opacity:0;transform:scale(0) translateY(-25px)}}

/* ── NOTIFS ── */
#notifs{position:fixed;top:calc(var(--hh) + var(--st) + 8px);left:50%;transform:translateX(-50%);z-index:800;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.notif{background:rgba(10,12,25,.97);border:1px solid var(--brd);border-radius:9px;padding:7px 13px;font-size:11.5px;font-family:'Exo 2';backdrop-filter:blur(16px);box-shadow:0 4px 18px rgba(0,0,0,.4);animation:nIn .2s ease;white-space:nowrap}
@keyframes nIn{from{opacity:0;transform:translateY(-7px)}}
.notif.out{animation:nOut .22s ease forwards}
@keyframes nOut{to{opacity:0;transform:translateY(-7px)}}
</style>
</head>
<body>

<div id="bgLayer"><video id="bgVideo" autoplay muted loop playsinline></video><div id="bgImg"></div></div>

<!-- LOADER -->
<div id="loader">
  <div class="ld-strip"><div class="ld-f"></div><div class="ld-f"></div><div class="ld-f"></div><div class="ld-f"></div><div class="ld-f"></div></div>
  <div class="ld-logo"><i class="fa-solid fa-film"></i> Film Odasi</div>
  <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
  <div class="ld-sub">BAGLANIYOR</div>
</div>

<!-- JOIN -->
<div id="joinScreen">
  <div class="jcard">
    <div class="jlogo"><i class="fa-solid fa-clapperboard"></i> Film Odasi</div>
    <div class="jsub">SINEMA SALONU</div>
    <div class="jf">
      <label><i class="fa-solid fa-user"></i> KULLANICI ADI</label>
      <input class="jin" id="jName" placeholder="Adinizi girin..." maxlength="22"/>
    </div>
    <div class="jf">
      <label><i class="fa-solid fa-image"></i> PROFIL RESMI URL (istege bagli)</label>

        <input class="jin" id="jAvUrl" placeholder="https://..." oninput="prevJAv()"/>

    </div>

<!-- APP -->
<div id="app">
  <header id="hdr">
    <div class="hlogo"><i class="fa-solid fa-film"></i> Film</div>
    <div class="hname" id="hRoomName">Film Odasi</div>
    <div class="hsp"></div>
    <div class="hlive"><div class="hdot"></div>CANLI</div>
    <div class="hcnt"><i class="fa-solid fa-users"></i><span id="hCnt">0</span></div>
    <div id="myAvBtn" onclick="openModal('avatarModal')"><img id="myAvImg" alt=""/><span id="myAvInit">?</span></div>
    <button class="hbtn gold" id="adminBtn" style="display:none" onclick="openModal('adminModal')"><i class="fa-solid fa-gear"></i></button>
    <button class="hbtn" onclick="openModal('usersModal')"><i class="fa-solid fa-users"></i></button>
    <button class="hbtn red" onclick="leaveRoom()"><i class="fa-solid fa-right-from-bracket"></i></button>

  <div id="main">
    <!-- VIDEO PANE -->
    <div id="videoPane">
      <div id="playerWrap">
        <div id="placeholder"><div class="ph-ic"><i class="fa-solid fa-clapperboard"></i></div><div class="ph-t">Video bekleniyor...</div></div>
      </div>
      <div id="vidBar">
        <i class="fa-solid fa-circle-play" style="font-size:9px;color:var(--acc2);flex-shrink:0"></i>
        <div id="vidTitle">Yayin bekleniyor...</div>
        <span class="vbadge" id="vTypeBadge" style="display:none"></span>
        <button class="vsm" onclick="doSync()"><i class="fa-solid fa-rotate"></i></button>

      </div>
      <div id="seatsArea">
        <div class="slbl"><i class="fa-solid fa-couch"></i> KOLTUKLAR <span style="margin-left:auto;color:var(--acc2);font-size:9px;font-weight:400" id="voiceLbl"></span></div>
        <div id="seatRow"></div>
      </div>
    </div>
    <!-- CHAT PANE -->
    <div id="chatPane">
      <div id="userStrip"></div>
      <div id="chatBody"></div>
      <div id="inputArea">
        <div class="qrow">
          <span style="font-size:9px;color:var(--mut);flex-shrink:0;font-family:'Exo 2'"><i class="fa-solid fa-fire" style="color:var(--rose)"></i></span>
          <div class="qchip" onclick="qi('❤️')">❤️</div>
          <div class="qchip" onclick="qi('😂')">😂</div>
          <div class="qchip" onclick="qi('🔥')">🔥</div>
          <div class="qchip" onclick="qi('👏')">👏</div>
          <div class="qchip" onclick="qi('🍿')">🍿</div>
          <div class="qchip" onclick="qi('⭐')">⭐</div>
          <div class="qchip" onclick="qi('😍')">😍</div>
          <div class="qchip" onclick="qi('💯')">💯</div>
        </div>
        <div class="irow">
          <textarea id="msgIn" rows="1" placeholder="Mesaj yaz..."></textarea>
          <button class="ibtn" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone-slash"></i></button>
          <button class="ibtn" id="giftBtn" onclick="openModal('giftModal')"><i class="fa-solid fa-gift"></i></button>
          <button class="ibtn" id="sendBtn" onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

  </div>
</div>

<!-- FX -->
<div id="fxOv"></div>
<div id="entVidOv"><video id="entVidEl" autoplay playsinline></video><div class="evn" id="entVidName"></div></div>
<div id="notifs"></div>

<!-- GIFT MODAL -->

  <div class="mbox" onclick="event.stopPropagation()">

    <div class="mtitle"><i class="fa-solid fa-gift"></i> Hediye Gonder</div>

    <div class="mbrow"><button class="mb s" onclick="closeModal('giftModal')">Iptal</button><button class="mb p" onclick="sendGift()"><i class="fa-solid fa-paper-plane"></i> Gonder</button></div>

</div>

      <div class="cpr" id="bgPresets"></div>

    <div class="mbrow"><button class="mb s" onclick="closeModal('avatarModal')">Iptal</button><button class="mb p" onclick="saveAvatar()"><i class="fa-solid fa-check"></i> Kaydet</button></div>
  </div>

<script>
/* ─── GLOBALS ─── */
const IS_ADMIN = new URLSearchParams(location.search).has('isAdmin');
let ws=null, me={}, users=[], roomSettings={}, videoState={};
let selGift=null, selEffect='royal';
let localStream=null, micOn=false;
const peers={};
const ICE=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
let activePlayer=null;

const GIFTS=[
  {e:'❤️',n:'Kalp'},{e:'🌹',n:'Gul'},{e:'💎',n:'Elmas'},{e:'👑',n:'Tac'},
  {e:'🎂',n:'Pasta'},{e:'🎵',n:'Muzik'},{e:'🍾',n:'Sampanya'},{e:'✈️',n:'Ucus'},
  {e:'🦋',n:'Kelebek'},{e:'🌙',n:'Ay'},{e:'⭐',n:'Yildiz'},{e:'🎭',n:'Tiyatro'}
];
const EFFECTS=[
  {id:'royal',label:'Kraliyet'},{id:'sparkle',label:'Isiltili'},
  {id:'fire',label:'Ates'},{id:'normal',label:'Standart'}
];
const BG_PRESETS=[{c:'#0d0520',l:'Mor'},{c:'#05111a',l:'Lacivert'},{c:'#0a1205',l:'Yesil'},{c:'#1a0808',l:'Kirmizi'},{c:'#0f0a1a',l:'Koyu'}];

/* ─── LOADER ─── */
function runLoader(cb){
  const fill=document.getElementById('ldFill');let p=0;
  const t=setInterval(()=>{
    p+=Math.random()*18+4;
    if(p>=100){p=100;clearInterval(t);setTimeout(cb,250);}
    fill.style.width=p+'%';
  },90);
}

/* ─── INIT ─── */
window.addEventListener('DOMContentLoaded',()=>{
  if(IS_ADMIN) document.getElementById('adminNote').classList.add('show');

  // Floating particles on join screen
  const js=document.getElementById('joinScreen');
  ['★','◆','▲','●','♦'].forEach((s,i)=>{
    const p=document.createElement('div');p.className='jp';
    p.textContent=s;
    p.style.cssText=`left:${8+i*18}%;font-size:${10+Math.random()*14}px;color:rgba(167,139,250,${.1+Math.random()*.2});animation-duration:${12+Math.random()*14}s;animation-delay:${Math.random()*8}s`;
    js.prepend(p);
  });

  // Gift grid
  const gg=document.getElementById('giftGrid');
  GIFTS.forEach(g=>{
    const d=document.createElement('div');d.className='gcell';
    d.innerHTML=`<div class="gic">${g.e}</div><div class="gnm">${g.n}</div>`;
    d.onclick=()=>{selGift=g;gg.querySelectorAll('.gcell').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    gg.appendChild(d);
  });

  // Effect chips
  const ec=document.getElementById('effectChips');
  EFFECTS.forEach(ef=>{
    const d=document.createElement('div');
    d.className='echip'+(ef.id===selEffect?' sel':'');
    d.textContent=ef.label;
    d.onclick=()=>{selEffect=ef.id;ec.querySelectorAll('.echip').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    ec.appendChild(d);
  });

  // BG presets
  const bp=document.getElementById('bgPresets');
  BG_PRESETS.forEach(pc=>{
    const d=document.createElement('div');d.className='cpc';d.style.background=pc.c;d.title=pc.l;
    d.onclick=()=>{document.getElementById('adBg').value=pc.c;bp.querySelectorAll('.cpc').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    bp.appendChild(d);
  });

  // Seats
  const sr=document.getElementById('seatRow');
  for(let i=1;i<=9;i++){
    const s=document.createElement('div');s.className='seat';s.id='seat'+i;
    s.innerHTML=`<div class="seat-mic"><i class="fa-solid fa-microphone"></i></div>
    <div class="seat-av" id="sav${i}"><img id="savImg${i}" alt=""/><span id="savInit${i}"></span></div>
    <div class="seat-uname" id="sun${i}"></div>
    <div class="seat-back"><div class="seat-num">${i}</div></div>
    <div class="seat-cush"></div>
    <div class="seat-legs"><div class="seat-leg"></div><div class="seat-leg"></div></div>`;
    s.onclick=()=>clickSeat(i);sr.appendChild(s);
  }

  // Chat input
  const mi=document.getElementById('msgIn');
  mi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
  mi.addEventListener('input',()=>{mi.style.height='auto';mi.style.height=Math.min(mi.scrollHeight,76)+'px';});
  document.getElementById('jName').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});

  runLoader(()=>document.getElementById('loader').classList.add('gone'));
});

function prevJAv(){
  const url=document.getElementById('jAvUrl').value.trim();
  const img=document.getElementById('jAvImg'),ico=document.getElementById('jAvIco');
  if(url){img.src=url;img.style.display='block';ico.style.display='none';}
  else{img.style.display='none';ico.style.display='';}
}

function joinRoom(){
  const name=document.getElementById('jName').value.trim();
  if(!name){showNotif('Ad girin');return;}
  const avatar=document.getElementById('jAvUrl').value.trim();
  me={username:name,tur:IS_ADMIN?'admin':'user',avatar,seat:0,voice:false};
  document.getElementById('joinScreen').classList.add('gone');
  document.getElementById('app').style.display='flex';
  setMyAv(avatar,name);
  connectWS(name,me.tur,avatar);
}

/* ─── WEBSOCKET ─── */
function connectWS(username,tur,avatar){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{
    send({type:'join',username,tur,avatar});
    setInterval(()=>send({type:'ping'}),20000);
    if(IS_ADMIN){document.getElementById('adminBtn').style.display='';document.getElementById('adminCtrl').classList.add('show');}
  };
  ws.onmessage=e=>{let d;try{d=JSON.parse(e.data);}catch{return;}handleMsg(d);};
  ws.onclose=()=>{showNotif('Baglanti kesildi...');setTimeout(()=>location.reload(),2500);};
  ws.onerror=()=>{};
}
function send(data){if(ws&&ws.readyState===1)ws.send(JSON.stringify(data));}

function handleMsg(d){
  switch(d.type){
    case 'init':
      me.id=d.myId;
      d.chat.forEach(m=>renderMsg(m,false));
      updateUsers(d.users);applyRoom(d.room);applyVideo(d.video);scrollChat();
      break;
    case 'chat':renderMsg(d.msg);scrollChat();break;
    case 'users':updateUsers(d.users);break;
    case 'video_change':case 'video_sync':applyVideo(d.video);break;
    case 'room_settings':applyRoom(d.room);break;
    case 'entrance':showEntrance(d);break;
    case 'gift_fx':showGiftFx(d);break;
    case 'voice_peer_joined':if(d.peerId!==me.id)createOffer(d.peerId);break;
    case 'voice_peers_existing':d.peers.forEach(pid=>createOffer(pid));break;
    case 'voice_peer_left':closePeer(d.peerId);break;
    case 'webrtc_signal':handleSignal(d.from,d.signal);break;
    case 'banned':document.body.innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#f43f5e;font-size:18px;background:#05060f;text-align:center"><div><div style="font-size:48px;margin-bottom:16px"><i class="fa-solid fa-ban"></i></div>Odadan atildiniz.</div></div>';break;
  }
}

/* ─── VIDEO ─── */
function parseUrl(url){
  url=url.trim();
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if(m)return{type:'youtube',vid:m[1]};
  m=url.match(/ok\.ru\/video\/(\d+)/);
  if(m)return{type:'okru',vid:m[1]};
  m=url.match(/rutube\.ru\/video\/([a-z0-9]+)/i);
  if(m)return{type:'rutube',vid:m[1]};
  if(/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url))return{type:'mp4',vurl:url};
  return{type:'iframe',vurl:url};
}
function submitVideo(){
  const url=document.getElementById('vUrl').value.trim();
  if(!url)return;
  const title=document.getElementById('vName').value.trim()||'Video';
  const p=parseUrl(url);
  send({type:'video_change',vtype:p.type,vid:p.vid||'',vurl:p.vurl||url,title});
  document.getElementById('vUrl').value='';
}
function stopVideo(){send({type:'video_change',vtype:'none',vid:'',vurl:'',title:'Yayin bekleniyor...'});}
function doSync(){if(videoState)applyVideo(videoState);showNotif('Senkronize edildi');}

function applyVideo(v){
  if(!v)return;videoState=v;
  document.getElementById('vidTitle').textContent=v.title||'Video';
  const badge=document.getElementById('vTypeBadge');
  const types={youtube:['YT','vbyt'],okru:['OK','vbok'],rutube:['RT','vbrt'],mp4:['MP4','vbmp4'],iframe:['IFRAME','vbmp4']};
  if(v.type!=='none'&&types[v.type]){badge.textContent=types[v.type][0];badge.className='vbadge '+types[v.type][1];badge.style.display='';}
  else badge.style.display='none';
  setPlayer(v);
}

function setPlayer(v){
  // Kill old player - this fixes the "ses geliyor video gidiyor" bug
  if(activePlayer){
    const el=activePlayer.el;
    if(activePlayer.type==='iframe'){
      try{el.contentWindow.postMessage('{"event":"command","func":"stopVideo","args":""}','*');}catch(e){}
      el.src='about:blank';
    }else if(activePlayer.type==='video'){
      el.pause();el.removeAttribute('src');el.load();
    }
    el.remove();activePlayer=null;
  }
  const wrap=document.getElementById('playerWrap');
  wrap.innerHTML='<div id="placeholder"><div class="ph-ic"><i class="fa-solid fa-clapperboard"></i></div><div class="ph-t">Video bekleniyor...</div></div>';
  if(!v||v.type==='none')return;

  let el;
  if(v.type==='youtube'){
    el=document.createElement('iframe');
    el.src=`https://www.youtube.com/embed/${v.vid}?autoplay=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    el.allow='autoplay;encrypted-media;fullscreen';el.allowFullscreen=true;
    activePlayer={type:'iframe',el};
  }else if(v.type==='okru'){
    el=document.createElement('iframe');
    el.src=`https://ok.ru/videoembed/${v.vid}?autoplay=1`;
    el.allow='autoplay;encrypted-media;fullscreen';
    activePlayer={type:'iframe',el};
  }else if(v.type==='rutube'){
    el=document.createElement('iframe');
    el.src=`https://rutube.ru/play/embed/${v.vid}?autoplay=1`;
    el.allow='autoplay;encrypted-media;fullscreen';
    activePlayer={type:'iframe',el};
  }else if(v.type==='mp4'){
    el=document.createElement('video');
    el.src=v.vurl;el.controls=true;el.autoplay=true;el.playsInline=true;
    activePlayer={type:'video',el};
  }else{
    el=document.createElement('iframe');
    el.src=v.vurl;el.allow='autoplay;encrypted-media;fullscreen';
    activePlayer={type:'iframe',el};
  }
  el.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:0;';
  wrap.innerHTML='';wrap.appendChild(el);
}

  renderStrip(list);renderSeats(list);updateMicBtn();
  // Gift dropdown
  const gt=document.getElementById('giftTo');gt.innerHTML='';
  list.filter(u=>u.id!==me.id).forEach(u=>{const o=document.createElement('option');o.value=u.username;o.textContent=u.username;gt.appendChild(o);});
  // Users modal
  const uc=document.getElementById('userCards');uc.innerHTML='';
  list.forEach(u=>{
    const d=document.createElement('div');
    d.className='ucard'+(u.tur==='admin'?' ac':u.tur==='vip'?' vc':'');
    const av=u.avatar?`<div class="uc-av"><img src="${esc(u.avatar)}" alt="" onerror="this.style.display='none'"/></div>`:`<div class="uc-av">${esc(u.username.charAt(0).toUpperCase())}</div>`;
    const ri=u.tur==='admin'?'<i class="fa-solid fa-crown" style="color:var(--gold);font-size:9px"></i>':u.tur==='vip'?'<i class="fa-solid fa-star" style="color:var(--acc2);font-size:9px"></i>':'';
    const acts=IS_ADMIN&&u.id!==me.id?`<div class="uc-acts"><button class="ua" onclick="event.stopPropagation();send({type:'mute_user',username:'${esc(u.username)}'})" title="${u.muted?'Ses ac':'Sustur'}"><i class="fa-solid ${u.muted?'fa-volume-high':'fa-volume-xmark'}"></i></button><button class="ua d" onclick="event.stopPropagation();if(confirm('${esc(u.username)} atilsin?'))send({type:'kick_user',username:'${esc(u.username)}'})" title="At"><i class="fa-solid fa-ban"></i></button></div>`:'';
    d.innerHTML=`${av}<div class="uc-info"><div class="uc-name">${ri} ${esc(u.username)}</div><div class="uc-meta"><span class="lb">Lv${u.lvl||1}</span>${u.seat?`<span><i class="fa-solid fa-couch"></i> ${u.seat}</span>`:''}${u.voice?'<span style="color:var(--grn)"><i class="fa-solid fa-microphone"></i></span>':''}${u.muted?'<span style="color:var(--rose)"><i class="fa-solid fa-volume-xmark"></i></span>':''}</div></div>${acts}`;
    uc.appendChild(d);
  });
  const vc=list.filter(u=>u.voice).length;
  document.getElementById('voiceLbl').innerHTML=vc>0?`<i class="fa-solid fa-microphone"></i> ${vc} sesli`:'';
}

function renderStrip(list){
  const strip=document.getElementById('userStrip');strip.innerHTML='';
  list.forEach(u=>{
    const d=document.createElement('div');
    let cls='uitem';
    if(u.tur==='admin')cls+=' au';else if(u.tur==='vip')cls+=' vu';
    if(u.voice)cls+=' vou';if(u.seat)cls+=' su';
    d.className=cls;
    const init=u.username.charAt(0).toUpperCase();
    const badge=u.tur==='admin'?`<div class="uitem-badge" style="color:var(--gold)"><i class="fa-solid fa-crown"></i></div>`:u.tur==='vip'?`<div class="uitem-badge" style="color:var(--acc2)"><i class="fa-solid fa-star"></i></div>`:'';
    d.innerHTML=`<div class="uitem-av">${u.avatar?`<img src="${esc(u.avatar)}" alt="" onerror="this.style.display='none'"/>`+''+init:''+init}${badge}</div><div class="uitem-name">${esc(u.username)}</div>`;
    // fix avatar display
    const img=d.querySelector('img');
    if(img){img.onload=()=>{img.style.display='block';const sp=d.querySelector('.uitem-av');if(sp){const txt=sp.childNodes[1];if(txt&&txt.nodeType===3)txt.textContent='';}}}
    strip.appendChild(d);
  });
}

function renderSeats(list){
  for(let i=1;i<=9;i++){
    const sel=document.getElementById('seat'+i);if(!sel)continue;
    const occ=list.find(u=>u.seat===i);
    sel.classList.remove('occ','mine','voice');
    const sav=document.getElementById('sav'+i);
    const savImg=document.getElementById('savImg'+i);
    const savInit=document.getElementById('savInit'+i);
    const sun=document.getElementById('sun'+i);
    if(occ){
      sel.classList.add('occ');
      if(occ.id===me.id)sel.classList.add('mine');
      if(occ.voice)sel.classList.add('voice');
      if(occ.avatar){savImg.src=occ.avatar;savImg.style.display='block';savInit.style.display='none';}
      else{savImg.style.display='none';savInit.style.display='';savInit.textContent=occ.username.charAt(0).toUpperCase();}
      sun.textContent=occ.username;
    }else{
      if(savImg){savImg.src='';savImg.style.display='none';}
      if(savInit)savInit.textContent='';
      if(sun)sun.textContent='';
    }
  }
}

function applyRoom(r){
  if(!r)return;roomSettings=r;
  document.getElementById('hRoomName').textContent=r.name||'Film Odasi';
  document.title=r.name||'Film Odasi';
  const bgV=document.getElementById('bgVideo'),bgI=document.getElementById('bgImg'),url=r.bg_url||'';
  if(/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url)){
    bgI.style.display='none';bgV.style.display='block';
    if(bgV.getAttribute('data-src')!==url){bgV.setAttribute('data-src',url);bgV.src=url;bgV.load();bgV.play().catch(()=>{});}
  }else if(url.startsWith('http')||url.startsWith('/')){
    bgV.style.display='none';bgI.style.backgroundImage=`url(${url})`;bgI.style.display='block';
  }else if(url.startsWith('#')){
    bgV.style.display='none';bgI.style.backgroundImage='none';bgI.style.background=url;bgI.style.display='block';
  }else{bgV.style.display='none';bgI.style.display='none';}
  document.getElementById('adName').value=r.name||'';
  document.getElementById('adBg').value=r.bg_url||'';
  document.getElementById('adEntVid').value=r.entrance_video||'';
  selEffect=r.entrance_effect||'royal';
  document.querySelectorAll('.echip').forEach(c=>{const ef=EFFECTS.find(e=>e.id===selEffect);c.classList.toggle('sel',ef&&c.textContent===ef.label);});
}

/* ─── SEATS + VOICE ─── */
async function clickSeat(n){
  const occ=users.find(u=>u.seat===n);
  if(occ&&occ.id!==me.id){showNotif('Bu koltuk dolu');return;}
  if(me.seat===n){send({type:'take_seat',seat:n});me.seat=0;await disableVoice();}
  else{send({type:'take_seat',seat:n});me.seat=n;showNotif(`Koltuk ${n} alindi`);}
}
async function toggleMic(){
  if(!me.seat){showNotif('Once bir koltuğa oturun');return;}
  if(!localStream){await enableVoice();}
  else{micOn=!micOn;localStream.getAudioTracks().forEach(t=>{t.enabled=micOn;});updateMicBtn();showNotif(micOn?'Mikrofon acik':'Mikrofon kapali');}
}
async function enableVoice(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    micOn=true;send({type:'voice_join'});updateMicBtn();showNotif('Sesli sohbet aktif');
  }catch(e){showNotif('Mikrofon erisimi reddedildi');micOn=false;updateMicBtn();}
}
async function disableVoice(){
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  micOn=false;
  if(me.voice){send({type:'voice_leave'});me.voice=false;}
  Object.keys(peers).forEach(closePeer);updateMicBtn();
}
function updateMicBtn(){
  const btn=document.getElementById('micBtn'),ico=btn.querySelector('i');
  if(!me.seat){btn.className='ibtn dim';ico.className='fa-solid fa-microphone-slash';}
  else if(micOn&&localStream){btn.className='ibtn on';ico.className='fa-solid fa-microphone';}
  else{btn.className='ibtn';ico.className='fa-solid fa-microphone-slash';}
}

/* ─── WEBRTC ─── */
async function createOffer(peerId){
  if(peers[peerId])return;
  const pc=newPC(peerId);
  try{const offer=await pc.createOffer();await pc.setLocalDescription(offer);send({type:'webrtc_signal',to:peerId,signal:{offer:pc.localDescription}});}
  catch(e){closePeer(peerId);}
}
async function handleSignal(from,sig){
  if(sig.offer){
    if(peers[from])closePeer(from);
    const pc=newPC(from);
    try{await pc.setRemoteDescription(new RTCSessionDescription(sig.offer));const ans=await pc.createAnswer();await pc.setLocalDescription(ans);send({type:'webrtc_signal',to:from,signal:{answer:pc.localDescription}});}
    catch(e){closePeer(from);}
  }else if(sig.answer){
    const pc=peers[from];
    if(pc&&pc.signalingState!=='stable'){try{await pc.setRemoteDescription(new RTCSessionDescription(sig.answer));}catch(e){}}
  }else if(sig.candidate){
    const pc=peers[from];if(pc){try{await pc.addIceCandidate(new RTCIceCandidate(sig.candidate));}catch(e){}}
  }
}
function newPC(peerId){
  const pc=new RTCPeerConnection({iceServers:ICE});
  peers[peerId]=pc;
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=evt=>playRemote(peerId,evt.streams[0]);
  pc.onicecandidate=evt=>{if(evt.candidate)send({type:'webrtc_signal',to:peerId,signal:{candidate:evt.candidate}});};
  pc.onconnectionstatechange=()=>{if(['failed','disconnected','closed'].includes(pc.connectionState))closePeer(peerId);};
  return pc;
}
function playRemote(peerId,stream){
  let a=document.getElementById('ra_'+peerId);
  if(!a){a=document.createElement('audio');a.id='ra_'+peerId;a.autoplay=true;a.style.display='none';document.body.appendChild(a);}
  a.srcObject=stream;
}
function closePeer(peerId){
  const pc=peers[peerId];if(pc){try{pc.close();}catch(e){}delete peers[peerId];}
  const a=document.getElementById('ra_'+peerId);if(a)a.remove();
}

/* ─── ENTRANCE ─── */
function showEntrance(d){
  if(d.entrance_video&&d.entrance_video.trim()){
    const ov=document.getElementById('entVidOv'),vid=document.getElementById('entVidEl');
    document.getElementById('entVidName').textContent=`${d.username} odaya katildi!`;
    vid.src=d.entrance_video;ov.classList.add('show');vid.play().catch(()=>{});
    const done=()=>{ov.classList.remove('show');vid.src='';vid.pause();};
    vid.onended=done;setTimeout(done,14000);return;
  }
  const ov=document.getElementById('fxOv');
  const chars=['★','◆','▲','✦','●'];
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='sparkle';
    s.textContent=chars[Math.floor(Math.random()*chars.length)];
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*.9}s;font-size:${9+Math.random()*11}px;color:rgba(167,139,250,${.4+Math.random()*.6})`;
    ov.appendChild(s);setTimeout(()=>{try{ov.removeChild(s);}catch(e){}},2600);
  }
  const ico=d.tur==='admin'?'fa-crown':d.tur==='vip'?'fa-star':'fa-user';
  const icoc=d.tur==='admin'?'var(--gold)':d.tur==='vip'?'var(--acc2)':'var(--mut)';
  const el=document.createElement('div');el.className='ent-fx';
  el.innerHTML=`<i class="fa-solid ${ico} ent-ic" style="color:${icoc}"></i><div class="ent-name">${esc(d.username)}</div><div class="ent-sub">odaya katildi</div>`;
  ov.appendChild(el);setTimeout(()=>{try{ov.removeChild(el);}catch(e){}},5200);
}

function showGiftFx(d){
  const ov=document.getElementById('fxOv');
  const el=document.createElement('div');el.className='gift-fx';
  el.innerHTML=`<div class="gift-big">${d.emoji||'★'}</div><div class="gift-lbl">${esc(d.from)} → ${esc(d.to)}: ${esc(d.name)}</div>`;
  ov.appendChild(el);setTimeout(()=>{try{ov.removeChild(el);}catch(e){}},4200);
}

  const img=document.getElementById('myAvImg'),init=document.getElementById('myAvInit');
  if(url){img.src=url;img.style.display='block';init.style.display='none';img.onerror=()=>{img.style.display='none';init.style.display='';init.textContent=name?name.charAt(0).toUpperCase():'?';};}
  else{img.style.display='none';init.style.display='';init.textContent=name?name.charAt(0).toUpperCase():'?';}

/* ─── MODALS ─── */
function openModal(id){
  if(id==='avatarModal'){
    document.getElementById('avInput').value=me.avatar||'';
    const img=document.getElementById('avPrevImg'),ico=document.getElementById('avPrevIco');
    if(me.avatar){img.src=me.avatar;img.style.display='block';ico.style.display='none';}
    else{img.style.display='none';ico.style.display='';}
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mover.open').forEach(m=>m.classList.remove('open'));});

/* ─── NOTIF ─── */
function showNotif(msg,dur=2600){
  const stack=document.getElementById('notifs');
  const n=document.createElement('div');n.className='notif';n.textContent=msg;stack.appendChild(n);
  setTimeout(()=>{n.classList.add('out');setTimeout(()=>{try{stack.removeChild(n);}catch(e){}},260);},dur);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function leaveRoom(){if(ws)ws.close();location.reload();}
window.addEventListener('beforeunload',()=>{if(ws)ws.close();});
