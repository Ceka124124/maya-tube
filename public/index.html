<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Film Odasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
/* ══ CINEMA THEME – RED & WHITE ══ */
:root{
  --acc:#c41230;
  --acc2:#e63950;
  --rose:#e11d48;
  --gold:#f59e0b;
  --cyan:#0891b2;
  --grn:#059669;
  --vio:#7c3aed;
  --txt:#1a0a0f;
  --txt2:#3d1520;
  --mut:#8a5060;
  --r:cubic-bezier(.16,1,.3,1);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --hh:48px;
  /* Surfaces – fully transparent, only slight white tint for readability */
  --s1:rgba(255,255,255,0.10);
  --s2:rgba(255,255,255,0.12);
  --s3:rgba(255,255,255,0.07);
  --brd:rgba(255,255,255,0.18);
  --brd2:rgba(255,255,255,0.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Rajdhani',sans-serif;color:var(--txt);touch-action:manipulation;background:transparent}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:2px;opacity:.4}
input,textarea,select{outline:none;-webkit-appearance:none;font-family:inherit;color:var(--txt);background:none}
button{border:none;cursor:pointer;-webkit-appearance:none;font-family:inherit;color:inherit;background:none}

/* ── FIXED BACKGROUND – sabit, değişmez ── */
#bgFixed{
  position:fixed;inset:0;z-index:0;
  background-image:url('https://freesorgupanel.neocities.org/bg_move_new.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  pointer-events:none;
}
/* Admin bg_url değişikliğini engellemek için bgLayer tamamen devre dışı */
#bgLayer{display:none!important}
#bgVideo{display:none!important}
#bgImg{display:none!important}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:900;
  background:rgba(20,5,10,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .5s,transform .5s;
}
#loader.gone{opacity:0;transform:scale(1.04);pointer-events:none}
.ld-logo{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(18px,6vw,30px);
  background:linear-gradient(135deg,#fff,#e63950,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2.5s infinite;background-size:200%;
}
@keyframes shimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.ld-strip{display:flex;gap:5px;margin-bottom:4px}
.ld-f{width:8px;height:12px;border:2px solid #e63950;border-radius:3px;animation:ff .45s infinite alternate}
.ld-f:nth-child(2n){animation-delay:.1s}.ld-f:nth-child(3n){animation-delay:.2s}
@keyframes ff{from{opacity:.2;transform:scaleY(.6)}to{opacity:1;transform:scaleY(1)}}
.ld-bar{width:180px;height:2px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,#c41230,#e63950);border-radius:2px;transition:width .12s}
.ld-sub{font-family:'Exo 2';font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.22em}

/* ── JOIN ── */
#joinScreen{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;padding:18px;
  transition:opacity .35s,transform .35s;
}
#joinScreen.gone{opacity:0;transform:scale(1.05);pointer-events:none}
.jp{position:absolute;pointer-events:none;animation:jfloat linear infinite;font-style:normal}
@keyframes jfloat{0%{transform:translateY(105vh) rotate(0);opacity:0}8%{opacity:.35}90%{opacity:.2}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

.jcard{
  background:rgba(255,255,255,0.13);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:22px;padding:26px 22px;
  width:min(420px,100%);
  box-shadow:0 8px 48px rgba(180,0,30,.25),0 0 0 1px rgba(255,255,255,.1) inset;
  backdrop-filter:blur(28px);
  display:flex;flex-direction:column;gap:14px;
}
.jlogo{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(14px,4.5vw,24px);
  background:linear-gradient(135deg,#fff,#e63950,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;animation:shimmer 3s infinite;background-size:200%;line-height:1.3;
}
.jsub{font-family:'Exo 2';font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.2em;text-align:center;margin-top:-8px}
.jf{display:flex;flex-direction:column;gap:5px}
.jf label{font-family:'Exo 2';font-size:9px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.1em;display:flex;align-items:center;gap:5px}
.jf label i{font-size:10px;color:var(--acc2)}
.jin{
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);
  border-radius:10px;padding:11px 13px;
  font-family:'Exo 2';font-size:14px;width:100%;color:#fff;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
.jin:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(230,57,80,.18)}
.jin::placeholder{color:rgba(255,255,255,.35)}
.av-row{display:flex;align-items:center;gap:10px}
.av-row .jin{flex:1}
.av-thumb{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;font-family:'Exo 2';
}
.av-thumb img{width:100%;height:100%;object-fit:cover;display:none}
.admin-note{
  font-family:'Exo 2';font-size:10px;color:#fef08a;
  background:rgba(196,18,48,.15);border:1px solid rgba(196,18,48,.3);
  border-radius:8px;padding:7px 10px;display:none;align-items:center;gap:6px;
}
.admin-note.show{display:flex}
.jbtn{
  background:linear-gradient(135deg,#c41230,#e63950);
  border-radius:12px;padding:13px;
  color:#fff;font-family:'Cinzel Decorative',serif;font-size:13px;
  transition:transform .15s,box-shadow .15s;letter-spacing:.04em;
  box-shadow:0 4px 18px rgba(196,18,48,.4);
}
.jbtn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(196,18,48,.25)}
.saved-hint{font-family:'Exo 2';font-size:10px;color:rgba(255,255,255,.5);text-align:center;cursor:pointer;text-decoration:underline}
.saved-hint:hover{color:var(--acc2)}

/* ── APP ── */
#app{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;height:100dvh}

/* ── HEADER – şeffaf ── */
#hdr{
  flex-shrink:0;height:calc(var(--hh) + var(--st));padding-top:var(--st);
  background:rgba(255,255,255,0.08);
  border-bottom:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  display:flex;align-items:center;gap:7px;padding-inline:11px;
  box-shadow:0 2px 16px rgba(0,0,0,.15);
  position:relative;z-index:50;
}
.hlogo{
  font-family:'Cinzel Decorative',serif;font-size:12px;
  background:linear-gradient(135deg,#fff,var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;flex-shrink:0;
}
.hname{font-family:'Exo 2';font-size:9px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.hsp{flex:1}
.hlive{
  display:flex;align-items:center;gap:3px;
  background:rgba(225,29,72,.15);border:1px solid rgba(225,29,72,.35);
  border-radius:10px;padding:3px 7px;font-size:8px;color:#ff6b7a;font-weight:700;letter-spacing:.08em;flex-shrink:0;
}
.hdot{width:4px;height:4px;border-radius:50%;background:#ff6b7a;animation:dp 1.2s infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.2}}
.hcnt{font-size:9px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:3px;flex-shrink:0}
.hbtn{
  background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);
  border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);
  transition:all .15s;flex-shrink:0;
}
.hbtn:active{transform:scale(.91);background:rgba(255,255,255,.2)}
.hbtn.red{background:rgba(225,29,72,.12);border-color:rgba(225,29,72,.3);color:#ff6b7a}
.hbtn.gold{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d}
#myAvBtn{
  width:28px;height:28px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;font-family:'Exo 2';
  cursor:pointer;transition:border-color .2s;
}
#myAvBtn:active{transform:scale(.9)}
#myAvBtn img{width:100%;height:100%;object-fit:cover;display:none}

/* ── MAIN LAYOUT ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
@media(min-width:768px){
  #main{flex-direction:row}
  #videoPane{width:clamp(280px,50%,600px);flex-shrink:0;border-right:1px solid var(--brd)}
  #playerWrap{height:auto!important;aspect-ratio:16/9}
  #chatPane{flex:1;min-width:0}
}

/* ── VIDEO PANE – şeffaf ── */
#videoPane{flex-shrink:0;display:flex;flex-direction:column;background:transparent;backdrop-filter:blur(8px)}
#playerWrap{height:clamp(150px,32vh,290px);position:relative;background:#000;overflow:hidden;flex-shrink:0}

/* ── EKRan kenarı – cinema screen ── */
#playerWrap::before{
  content:'';
  position:absolute;inset:0;z-index:5;
  background:url('https://freesorgupanel.neocities.org/cinema_screen.png') center/100% 100% no-repeat;
  pointer-events:none;
}
#playerWrap iframe,#playerWrap video{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:1}
#placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#1a0005,#0d0002);z-index:1;
}
.ph-ic{font-size:40px;color:rgba(230,57,80,.45);animation:flt 4s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ph-t{font-family:'Cinzel Decorative';font-size:10px;color:rgba(255,200,200,.3);text-align:center;padding:0 20px}

#vidBar{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:5px 9px;background:rgba(255,255,255,0.07);border-bottom:1px solid var(--brd2);min-height:30px;
}
#vidTitle{font-family:'Exo 2';font-size:10px;color:rgba(255,255,255,.75);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vbadge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:'Exo 2';flex-shrink:0}
.vbyt{background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.3);color:#fc6b6b}
.vbmp4{background:rgba(8,145,178,.1);border:1px solid rgba(8,145,178,.28);color:#67e8f9}
.vbok{background:rgba(230,57,80,.12);border:1px solid rgba(230,57,80,.28);color:#fca5a5}
.vbrt{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);color:#c4b5fd}
.vsm{font-size:11px;color:rgba(255,255,255,.5);padding:3px 5px;border-radius:5px;background:rgba(255,255,255,.08);flex-shrink:0;transition:all .14s}
.vsm:active{background:rgba(255,255,255,.18);color:#fff}

#adminCtrl{display:none;flex-shrink:0;padding:5px 8px;gap:4px;background:rgba(255,255,255,.06);border-bottom:1px solid var(--brd2)}
#adminCtrl.show{display:flex;align-items:center}
#vName{width:80px;flex-shrink:0;font-family:'Exo 2';font-size:11px;background:rgba(255,255,255,.1);border:1px solid var(--brd);border-radius:7px;padding:6px 8px;color:#fff}
#vUrl{flex:1;min-width:0;font-family:'Exo 2';font-size:11px;background:rgba(255,255,255,.1);border:1px solid var(--brd);border-radius:7px;padding:6px 8px;color:#fff}
#vName:focus,#vUrl:focus{border-color:var(--acc2);outline:none}
#vName::placeholder,#vUrl::placeholder{color:rgba(255,255,255,.3)}
.vcbtn{flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid var(--brd);border-radius:7px;padding:6px 9px;font-size:12px;color:rgba(255,255,255,.8);transition:all .14s}
.vcbtn:active{transform:scale(.91)}

/* ── CINEMA SEATS – koltuk resmiyle ── */
#seatsArea{
  flex-shrink:0;
  background:transparent;
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:12px 10px 10px;
}
.slbl{font-family:'Exo 2';font-size:8px;color:rgba(255,255,255,.5);letter-spacing:.14em;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:5px}
.slbl i{color:var(--acc2);font-size:10px}
#seatRow{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;justify-content:flex-start;padding:4px 4px 8px}
#seatRow::-webkit-scrollbar{display:none}

/* Koltuk – resim bazlı */
.seat{
  flex-shrink:0;
  width:60px;
  cursor:pointer;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:52px;
  user-select:none;
  transition:transform .15s;
}
.seat:active{transform:scale(.92)}
.seat:hover{transform:scale(1.06)}

.seat-av{
  position:absolute;
  top:-50px;
  left:50%;
  transform:translateX(-50%);
  width:36px;height:36px;
  border-radius:50%;overflow:hidden;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.35);
  display:none;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;font-family:'Exo 2';
  z-index:3;
}
.seat-av img{width:100%;height:100%;object-fit:cover;display:none}
.seat-mic{position:absolute;top:-62px;left:50%;transform:translateX(-50%);font-size:9px;color:#4ade80;display:none;z-index:4}
.seat-mic i{animation:mw 1.4s ease-in-out infinite}
@keyframes mw{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.seat-uname{
  position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  font-size:7px;color:#fff;font-family:'Exo 2';
  white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;
  text-align:center;display:none;z-index:3;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}

/* Koltuk görseli */
.seat-img{
  width:56px;height:56px;
  background:url('https://freesorgupanel.neocities.org/movie_seat.png') center/contain no-repeat;
  position:relative;z-index:2;
  transition:filter .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;
}
.seat-num{
  position:absolute;bottom:4px;
  font-size:8px;color:rgba(255,255,255,.6);font-weight:700;font-family:'Exo 2';
  text-shadow:0 1px 3px rgba(0,0,0,.9);z-index:3;
}
/* Koltuk durumları */
.seat:hover .seat-img{filter:brightness(1.3) saturate(1.2);transform:translateY(-3px)}
.seat.occ .seat-img{filter:brightness(1.0) sepia(.3) hue-rotate(320deg) saturate(1.5)}
.seat.mine .seat-img{filter:brightness(1.2) sepia(.5) hue-rotate(320deg) saturate(2);drop-shadow:0 0 10px #e63950}
.seat.occ .seat-av{display:flex}
.seat.occ .seat-uname{display:block}
.seat.voice .seat-mic{display:block}

/* ── CHAT PANE – şeffaf ── */
#chatPane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:transparent;backdrop-filter:blur(6px)}

/* User strip */
#userStrip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 9px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);min-height:52px}
#userStrip::-webkit-scrollbar{display:none}
.uitem{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default}
.uitem-av{width:30px;height:30px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'Exo 2';position:relative;transition:border-color .2s}
.uitem-av img{width:100%;height:100%;object-fit:cover}
.uitem-badge{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;border:1px solid rgba(0,0,0,.2);background:rgba(20,5,10,.8)}
.uitem-name{font-family:'Exo 2';font-size:7px;color:rgba(255,255,255,.5);max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.uitem.au .uitem-av{border-color:var(--gold)}
.uitem.vu .uitem-av{border-color:var(--vio)}
.uitem.vou .uitem-av{border-color:var(--grn);box-shadow:0 0 7px rgba(5,150,105,.4)}
.uitem.su .uitem-av{border-color:var(--acc2)}

/* Chat body */
#chatBody{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.cmsg{padding:6px 9px;border-radius:9px;word-break:break-word;font-family:'Exo 2';font-size:12.5px;line-height:1.45;animation:mi .22s var(--r)}
@keyframes mi{from{opacity:0;transform:translateY(4px)}}
.cmsg.sys{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:rgba(255,255,255,.5);font-style:italic;font-size:10.5px;text-align:center}
.cmsg.gift{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);text-align:center;color:rgba(255,255,255,.8)}
.cmsg.norm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.cmsg.me{background:rgba(196,18,48,.12);border:1px solid rgba(196,18,48,.22);color:#fff}
.ctop{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.cav{width:18px;height:18px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff}
.cav img{width:100%;height:100%;object-fit:cover}
.cwho{font-size:10px;font-weight:700;letter-spacing:.03em}
.wa{color:#fcd34d}.wv{color:#c4b5fd}.wu{color:#67e8f9}.ws{color:rgba(255,255,255,.45)}
.ctxt{color:rgba(255,255,255,.9);font-size:12.5px}

/* Input area */
#inputArea{flex-shrink:0;padding:6px 8px;padding-bottom:calc(6px + var(--sb));border-top:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.07);display:flex;flex-direction:column;gap:5px}
.qrow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;align-items:center}
.qrow::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:3px 8px;font-size:11px;color:rgba(255,255,255,.8);font-family:'Exo 2';cursor:pointer;transition:all .12s;white-space:nowrap}
.qchip:active{background:rgba(255,255,255,.18);transform:scale(.93)}
.irow{display:flex;gap:5px;align-items:flex-end}
#msgIn{flex:1;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:9px;padding:8px 11px;font-family:'Exo 2';font-size:13.5px;color:#fff;resize:none;max-height:76px;line-height:1.4;transition:border-color .15s}
#msgIn:focus{border-color:var(--acc2)}
#msgIn::placeholder{color:rgba(255,255,255,.3)}

/* ── NOTIFS ── */

@keyframes nIn{from{opacity:0;transform:translateY(-7px)}}
.notif.out{animation:nOut .22s ease forwards}
@keyframes nOut{to{opacity:0;transform:translateY(-7px)}}
</style>
</head>

/* ══ WEBSOCKET ══ */
function connectWS(username,tur,avatar){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{
    send({type:'join',username,tur,avatar});
    setInterval(()=>send({type:'ping'}),20000);
    if(IS_ADMIN){document.getElementById('adminBtn').style.display='';document.getElementById('adminCtrl').classList.add('show');}
  };
  ws.onmessage=e=>{let d;try{d=JSON.parse(e.data);}catch{return;}handleMsg(d);};
  ws.onclose=()=>{showNotif('Baglanti kesildi...');setTimeout(()=>location.reload(),2500);};
  ws.onerror=()=>{};
}
function send(data){if(ws&&ws.readyState===1)ws.send(JSON.stringify(data));}

function handleMsg(d){
  switch(d.type){
    case 'init':
      me.id=d.myId;
      d.chat.forEach(m=>renderMsg(m,false));
      updateUsers(d.users);applyRoom(d.room);applyVideo(d.video);scrollChat();
      break;
    case 'chat':renderMsg(d.msg);scrollChat();break;
    case 'users':updateUsers(d.users);break;
    case 'video_change':case 'video_sync':applyVideo(d.video);break;
    case 'room_settings':applyRoom(d.room);break;
    case 'entrance':showEntrance(d);break;
    case 'gift_fx':showGiftFx(d);break;
    case 'voice_peer_joined':if(d.peerId!==me.id)createOffer(d.peerId);break;
    case 'voice_peers_existing':d.peers.forEach(pid=>createOffer(pid));break;
    case 'voice_peer_left':closePeer(d.peerId);break;
    case 'webrtc_signal':handleSignal(d.from,d.signal);break;
    case 'banned':
      document.body.innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#fc6b6b;font-size:18px;background:#0d0005;text-align:center"><div><div style="font-size:52px;margin-bottom:16px"><i class="fa-solid fa-ban"></i></div>Odadan atildiniz.</div></div>';
      break;
  }
}

/* ══ VIDEO ══ */
function parseUrl(url){
  url=url.trim();
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if(m)return{type:'youtube',vid:m[1]};
  m=url.match(/ok\.ru\/video\/(\d+)/);
  if(m)return{type:'okru',vid:m[1]};
  m=url.match(/rutube\.ru\/video\/([a-z0-9]+)/i);
  if(m)return{type:'rutube',vid:m[1]};
  if(/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url))return{type:'mp4',vurl:url};
  return{type:'iframe',vurl:url};
}
function submitVideo(){
  const url=document.getElementById('vUrl').value.trim();
  if(!url)return;
  const title=document.getElementById('vName').value.trim()||'Video';
  const p=parseUrl(url);
  send({type:'video_change',vtype:p.type,vid:p.vid||'',vurl:p.vurl||url,title});
  document.getElementById('vUrl').value='';
}
function stopVideo(){send({type:'video_change',vtype:'none',vid:'',vurl:'',title:'Yayin bekleniyor...'});}
function doSync(){if(videoState)applyVideo(videoState);showNotif('Senkronize edildi');}

function applyVideo(v){
  if(!v)return;videoState=v;
  document.getElementById('vidTitle').textContent=v.title||'Video';
  const badge=document.getElementById('vTypeBadge');
  const types={youtube:['YT','vbyt'],okru:['OK','vbok'],rutube:['RT','vbrt'],mp4:['MP4','vbmp4'],iframe:['IFRAME','vbmp4']};
  if(v.type!=='none'&&types[v.type]){badge.textContent=types[v.type][0];badge.className='vbadge '+types[v.type][1];badge.style.display='';}
  else badge.style.display='none';
  setPlayer(v);
}
function setPlayer(v){
  if(activePlayer){
    const el=activePlayer.el;
    if(activePlayer.type==='iframe'){try{el.contentWindow.postMessage('{"event":"command","func":"stopVideo","args":""}','*');}catch(e){}el.src='about:blank';}
    else if(activePlayer.type==='video'){el.pause();el.removeAttribute('src');el.load();}
    el.remove();activePlayer=null;
  }
  const wrap=document.getElementById('playerWrap');
  wrap.innerHTML='<div id="placeholder"><div class="ph-ic"><i class="fa-solid fa-clapperboard"></i></div><div class="ph-t">Video bekleniyor...</div></div>';
  if(!v||v.type==='none')return;
  let el;
  if(v.type==='youtube'){
    el=document.createElement('iframe');
    el.src=`https://www.youtube.com/embed/${v.vid}?autoplay=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    el.allow='autoplay;encrypted-media;fullscreen';el.allowFullscreen=true;
    activePlayer={type:'iframe',el};
  }else if(v.type==='okru'){
    el=document.createElement('iframe');el.src=`https://ok.ru/videoembed/${v.vid}?autoplay=1`;
    el.allow='autoplay;encrypted-media;fullscreen';activePlayer={type:'iframe',el};
  }else if(v.type==='rutube'){
    el=document.createElement('iframe');el.src=`https://rutube.ru/play/embed/${v.vid}?autoplay=1`;
    el.allow='autoplay;encrypted-media;fullscreen';activePlayer={type:'iframe',el};
  }else if(v.type==='mp4'){
    el=document.createElement('video');el.src=v.vurl;el.controls=true;el.autoplay=true;el.playsInline=true;
    activePlayer={type:'video',el};
  }else{
    el=document.createElement('iframe');el.src=v.vurl;el.allow='autoplay;encrypted-media;fullscreen';
    activePlayer={type:'iframe',el};
  }
  el.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:0;z-index:1;';
  wrap.innerHTML='';wrap.appendChild(el);
}

  else{micOn=!micOn;localStream.getAudioTracks().forEach(t=>{t.enabled=micOn;});updateMicBtn();showNotif(micOn?'Mikrofon acik':'Mikrofon kapali');}

async function enableVoice(){
  try{

/* ══ WEBRTC ══ */
async function createOffer(peerId){
  if(peers[peerId])return;
  const pc=newPC(peerId);
  try{
    const offer=await pc.createOffer({offerToReceiveAudio:true});
    await pc.setLocalDescription(offer);
    send({type:'webrtc_signal',to:peerId,signal:{offer:pc.localDescription}});
  }catch(e){closePeer(peerId);}
}
async function handleSignal(from,sig){
  if(sig.offer){
    if(peers[from])closePeer(from);
    const pc=newPC(from);
    try{
      await pc.setRemoteDescription(new RTCSessionDescription(sig.offer));
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      send({type:'webrtc_signal',to:from,signal:{answer:pc.localDescription}});
    }catch(e){closePeer(from);}
  }else if(sig.answer){
    const pc=peers[from];
    if(pc&&pc.signalingState!=='stable'){try{await pc.setRemoteDescription(new RTCSessionDescription(sig.answer));}catch(e){}}
  }else if(sig.candidate){
    const pc=peers[from];
    if(pc){try{await pc.addIceCandidate(new RTCIceCandidate(sig.candidate));}catch(e){}}
  }
}
function newPC(peerId){
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS,iceCandidatePoolSize:10});
  peers[peerId]=pc;
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=evt=>{
    if(evt.streams&&evt.streams[0])playRemote(peerId,evt.streams[0]);
  };
  pc.onicecandidate=evt=>{
    if(evt.candidate)send({type:'webrtc_signal',to:peerId,signal:{candidate:evt.candidate}});
  };
  pc.onconnectionstatechange=()=>{
    if(['failed','disconnected','closed'].includes(pc.connectionState))closePeer(peerId);
  };
  pc.oniceconnectionstatechange=()=>{
    if(pc.iceConnectionState==='failed'){
      try{pc.restartIce();}catch(e){}
    }
  };
  return pc;
}
function playRemote(peerId,stream){
  let a=document.getElementById('ra_'+peerId);
  if(!a){a=document.createElement('audio');a.id='ra_'+peerId;a.autoplay=true;a.style.display='none';document.body.appendChild(a);}
  a.srcObject=stream;a.play().catch(()=>{});
}
function closePeer(peerId){
  const pc=peers[peerId];if(pc){try{pc.close();}catch(e){}delete peers[peerId];}
  const a=document.getElementById('ra_'+peerId);if(a)a.remove();
}

/* ══ ADMIN ══ */
function applyAdmin(){
  const settings={name:document.getElementById('adName').value||'Film Odasi',bg_url:document.getElementById('adBg').value.trim(),entrance_video:document.getElementById('adEntVid').value.trim(),entrance_effect:selEffect};
  send({type:'room_settings',settings});closeModal('adminModal');showNotif('Ayarlar guncellendi');
}

/* ══ AVATAR ══ */
function setMyAv(url,name){
  const img=document.getElementById('myAvImg'),init=document.getElementById('myAvInit');
  if(url){img.src=url;img.style.display='block';init.style.display='none';img.onerror=()=>{img.style.display='none';init.style.display='';init.textContent=name?name.charAt(0).toUpperCase():'?';};}
  else{img.style.display='none';init.style.display='';init.textContent=name?name.charAt(0).toUpperCase():'?';}
}
function prevAv(){
  const url=document.getElementById('avInput').value.trim();
  const img=document.getElementById('avPrevImg'),ico=document.getElementById('avPrevIco');
  if(url){img.src=url;img.style.display='block';ico.style.display='none';img.onerror=()=>{img.style.display='none';ico.style.display='';};}
  else{img.style.display='none';ico.style.display='';}
}
function saveAvatar(){
  const url=document.getElementById('avInput').value.trim();
  me.avatar=url;send({type:'update_avatar',avatar:url});setMyAv(url,me.username);
  saveProfile(me.username,url);
  closeModal('avatarModal');showNotif('Profil resmi guncellendi');
}

/* ══ MODALS ══ */
function openModal(id){
  if(id==='avatarModal'){
    document.getElementById('avInput').value=me.avatar||'';prevAv();
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mover.open').forEach(m=>m.classList.remove('open'));});

/* ══ NOTIF ══ */
function showNotif(msg,dur=2600){
  const stack=document.getElementById('notifs');
  const n=document.createElement('div');n.className='notif';n.textContent=msg;stack.appendChild(n);
  setTimeout(()=>{n.classList.add('out');setTimeout(()=>{try{stack.removeChild(n);}catch(e){}},260);},dur);
}

/* ══ UTILS ══ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function leaveRoom(){if(ws)ws.close();location.reload();}
window.addEventListener('beforeunload',()=>{if(ws)ws.close();});
</script>
