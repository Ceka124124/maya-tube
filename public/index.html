<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CEKA-MAYA 🎬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a14;--surf:#0d1020;--surf2:#131629;--brd:rgba(120,80,255,.2);
  --acc:#7c3aed;--acc2:#a855f7;--gold:#f59e0b;--rose:#f43f5e;
  --cyan:#06b6d4;--grn:#10b981;--txt:#e2e8f0;--mut:#64748b;
  --glow:rgba(124,58,237,.4);--anim:cubic-bezier(.16,1,.3,1);
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --header-h:52px;--nav-h:58px;--player-pct:55%;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--txt);touch-action:manipulation}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--acc);border-radius:2px}

/* BG */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#dynBg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:all 1.2s;pointer-events:none}

/* ── LOADER ── */
#cinLoader{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s .2s,transform .5s .2s}
#cinLoader.out{opacity:0;transform:scale(1.04);pointer-events:none}
.fstrip{display:flex;gap:4px}
.fh{width:10px;height:14px;border:2px solid var(--acc);border-radius:3px;animation:fr .5s infinite alternate}
.fh:nth-child(2n){animation-delay:.1s}.fh:nth-child(3n){animation-delay:.2s}
@keyframes fr{from{opacity:.2;transform:scaleY(.7)}to{opacity:1;transform:scaleY(1)}}
.ltitle{font-family:'Cinzel Decorative',serif;font-size:20px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tpulse 1.4s infinite}
@keyframes tpulse{0%,100%{opacity:.35}50%{opacity:1}}
.lsub{font-size:10px;color:var(--mut);letter-spacing:.22em;font-family:'Exo 2'}
.lbw{width:170px;height:3px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.lb{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:4px;width:0;transition:width .22s}

/* ── JOIN SCREEN ── */
#joinScreen{position:fixed;inset:0;z-index:300;background:radial-gradient(ellipse at 50% 40%,#1a0a35 0%,#080a14 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;transition:opacity .42s,transform .42s}
#joinScreen.out{opacity:0;transform:scale(1.05);pointer-events:none}
.jp{position:absolute;border-radius:50%;animation:jfl linear infinite;opacity:0}
@keyframes jfl{0%{transform:translateY(110vh) rotate(0deg);opacity:0}8%{opacity:.5}90%{opacity:.4}100%{transform:translateY(-12vh) rotate(720deg);opacity:0}}
.join-logo{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,7vw,44px);background:linear-gradient(135deg,#a855f7 0%,#f59e0b 50%,#f43f5e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.3;animation:shimmer 3s infinite;background-size:200% 200%}
@keyframes shimmer{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.join-sub{font-size:10px;color:var(--mut);letter-spacing:.2em;font-family:'Exo 2'}
.join-card{background:rgba(13,16,32,.93);border:1px solid var(--brd);border-radius:20px;padding:24px 20px;width:min(400px,100%);box-shadow:0 0 50px rgba(124,58,237,.12);display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(20px)}
.jlbl{display:block;font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.1em;margin-bottom:5px;font-family:'Exo 2'}
.jinput{width:100%;background:rgba(255,255,255,.07);border:1.5px solid var(--brd);border-radius:11px;padding:12px 15px;color:var(--txt);font-family:'Exo 2',sans-serif;font-size:15px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.jinput:focus{outline:none;border-color:var(--acc2);box-shadow:0 0 0 4px rgba(168,85,247,.12)}
.jinput::placeholder{color:var(--mut)}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.rcard{border:2px solid var(--brd);border-radius:12px;padding:13px 10px;cursor:pointer;text-align:center;transition:all .18s;background:rgba(255,255,255,.025)}
.rcard:active,.rcard.sel{border-color:var(--acc2);background:rgba(168,85,247,.12)}
.re{font-size:26px;line-height:1}.rl{font-size:10px;color:var(--mut);margin-top:4px;font-weight:700;letter-spacing:.06em}
#welcomeBack{font-size:11px;color:var(--mut);font-family:'Exo 2';text-align:center;margin-top:-6px}
.jbtn{background:linear-gradient(135deg,#7c3aed,#a855f7,#f59e0b);background-size:200% 200%;animation:shimmer 3s infinite;border:none;border-radius:13px;padding:15px;color:#fff;font-family:'Cinzel Decorative',serif;font-size:14px;cursor:pointer;transition:transform .2s,box-shadow .2s;-webkit-appearance:none}
.jbtn:active{transform:scale(.97);box-shadow:0 8px 24px rgba(168,85,247,.4)}

/* ── APP SHELL ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;height:100vh;overflow:hidden}

/* ── HEADER ── */
#appHeader{flex-shrink:0;height:var(--header-h);background:rgba(8,10,20,.96);border-bottom:1px solid var(--brd);padding:0 12px;padding-top:var(--safe-top);display:flex;align-items:center;gap:9px;backdrop-filter:blur(20px);box-shadow:0 1px 28px rgba(124,58,237,.1);transition:height .3s var(--anim),opacity .3s;overflow:hidden}
#appHeader.hidden{height:0!important;opacity:0;pointer-events:none;border:none}
.logo{font-family:'Cinzel Decorative',serif;font-size:14px;background:linear-gradient(135deg,#a855f7,#f59e0b,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.logo-heart{-webkit-text-fill-color:#f43f5e;animation:hb 1.5s infinite;display:inline-block}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
#roomTitle{font-size:10px;color:var(--mut);font-family:'Exo 2';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.hact{margin-left:auto;display:flex;align-items:center;gap:6px}
.lbadge{display:flex;align-items:center;gap:4px;background:rgba(244,63,94,.13);border:1px solid rgba(244,63,94,.33);border-radius:18px;padding:3px 8px;font-size:9px;color:var(--rose);font-weight:700;letter-spacing:.04em}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--rose);animation:ldp 1.2s infinite}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.25}}
.hbtn{background:rgba(124,58,237,.2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:5px 9px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;-webkit-appearance:none}
.hbtn:active{transform:scale(.93)}
.hbtn.danger{background:rgba(244,63,94,.16);border-color:rgba(244,63,94,.3);color:var(--rose)}

/* ── MAIN CONTENT ── */
#mainContent{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── PLAYER SECTION ── */
#playerSection{flex-shrink:0;height:var(--player-pct);position:relative;background:#000;display:flex;flex-direction:column;transition:height .35s var(--anim)}
#playerWrap{flex:1;position:relative;overflow:hidden}
#playerWrap iframe,#playerWrap video{position:absolute;inset:0;width:100%;height:100%;border:0}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:radial-gradient(ellipse at center,#1a0a2e 0%,#080a14 70%)}
.ph-ico{font-size:52px;animation:float 4s ease-in-out infinite;opacity:.3}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ph-txt{font-size:13px;color:var(--mut);font-family:'Cinzel Decorative',serif;opacity:.45;text-align:center;padding:0 18px}

/* Suggest strip */
#sugBar{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:5px 11px;overflow-x:auto;background:rgba(8,10,20,.82);border-top:1px solid var(--brd);scrollbar-width:none}
#sugBar::-webkit-scrollbar{display:none}
.sug-lbl{font-size:9px;color:var(--mut);white-space:nowrap;letter-spacing:.1em;font-weight:700}
.sug-chip{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22);border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;white-space:nowrap;transition:all .14s;font-family:'Exo 2';color:var(--txt)}
.sug-chip:active{background:rgba(124,58,237,.32);transform:scale(.93)}

/* Video bar */
#vidBar{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 9px;background:rgba(8,10,20,.96);border-top:1px solid var(--brd);overflow-x:auto;scrollbar-width:none}
#vidBar::-webkit-scrollbar{display:none}
#urlInput{flex:1;min-width:150px;background:rgba(255,255,255,.07);border:1px solid var(--brd);border-radius:9px;padding:8px 11px;color:var(--txt);font-family:'Exo 2',sans-serif;font-size:12px;transition:border-color .2s;-webkit-appearance:none}
#urlInput:focus{outline:none;border-color:var(--acc2)}
#urlInput::placeholder{color:var(--mut)}
.vbtn{flex-shrink:0;background:rgba(124,58,237,.26);border:1px solid var(--brd);color:var(--txt);border-radius:9px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Rajdhani',sans-serif;white-space:nowrap;-webkit-appearance:none}
.vbtn:active{transform:scale(.93)}
.pbadge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;flex-shrink:0}
.by{background:rgba(255,0,0,.16);border:1px solid rgba(255,0,0,.38);color:#ff7070}
.bok{background:rgba(255,136,0,.16);border:1px solid rgba(255,136,0,.38);color:#ffaa44}
.bmp4{background:rgba(6,182,212,.16);border:1px solid rgba(6,182,212,.38);color:var(--cyan)}
.btwitch{background:rgba(100,65,165,.16);border:1px solid rgba(100,65,165,.38);color:#b09fff}

/* ── CHAT SECTION ── */
#chatSection{flex:1;display:flex;flex-direction:column;background:rgba(13,16,32,.97);overflow:hidden;min-height:0}
.tabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0}
.tab{flex:1;padding:9px 0;text-align:center;font-size:10px;font-weight:700;color:var(--mut);cursor:pointer;letter-spacing:.05em;border-bottom:2px solid transparent;transition:all .18s;font-family:'Exo 2'}
.tab:active{background:rgba(124,58,237,.07)}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc2)}
#chatBody{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch}
.cmsg{padding:6px 10px;border-radius:10px;font-size:13px;line-height:1.5;animation:mi .26s var(--anim);word-break:break-word;font-family:'Exo 2'}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.cmsg.sys{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.13);color:var(--mut);font-style:italic;font-size:11px}
.cmsg.gift{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.16);text-align:center}
.cmsg.norm{background:rgba(255,255,255,.022)}
.cmsg.mine{background:rgba(124,58,237,.11);border:1px solid rgba(124,58,237,.18)}
.mauth{font-weight:700;margin-right:4px;font-size:10px;letter-spacing:.03em}
.mauth.admin{color:var(--gold)}.mauth.vip{color:var(--acc2)}.mauth.user{color:var(--cyan)}.mauth.system{color:var(--mut)}
.mtxt{color:var(--txt)}

/* Users panel */
#usersPanel{flex:1;overflow-y:auto;padding:7px;display:none;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch}
#usersPanel.on{display:flex}
.ucard{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;background:rgba(255,255,255,.022);border:1px solid transparent;cursor:pointer;transition:all .16s;position:relative;overflow:hidden}
.ucard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.ucard.admin::before{background:var(--gold)}.ucard.vip::before{background:var(--acc2)}
.ucard:active{background:rgba(124,58,237,.1)}
.uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:rgba(124,58,237,.18);border:2px solid var(--brd);position:relative}
.uav::after{content:'';position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--grn);border:2px solid var(--surf2)}
.uinfo{flex:1;min-width:0}
.uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.umeta{font-size:9px;color:var(--mut);display:flex;gap:4px;align-items:center;margin-top:1px}
.lvl{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.26);color:var(--gold);font-size:9px;padding:1px 4px;border-radius:4px;font-weight:700}
.uacts{display:flex;gap:4px}
.uab{background:rgba(255,255,255,.07);border:none;border-radius:5px;padding:4px 7px;font-size:10px;color:var(--mut);cursor:pointer;-webkit-appearance:none}
.uab:active{background:rgba(255,255,255,.18)}

/* Seats */
#seatsPanel{flex:1;overflow-y:auto;padding:7px;display:none;-webkit-overflow-scrolling:touch}
#seatsPanel.on{display:block}
.seats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.seat{aspect-ratio:1;border-radius:12px;border:2px solid var(--brd);background:rgba(255,255,255,.022);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .18s var(--anim);font-size:22px}
.seat:active:not(.occ){transform:scale(.9)}
.seat.occ{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.06);cursor:default}
.seat.mine{border-color:var(--acc2);background:rgba(168,85,247,.13);box-shadow:0 0 16px rgba(168,85,247,.16)}
.seat-lbl{font-size:8px;color:var(--mut);letter-spacing:.04em;font-weight:700}
.seat-usr{font-size:8px;color:var(--grn);font-weight:600;text-align:center;padding:0 3px;word-break:break-all;line-height:1.2}

/* Chat input */
.cinput{flex-shrink:0;padding:7px;border-top:1px solid var(--brd);background:rgba(8,10,20,.88);display:flex;flex-direction:column;gap:5px;padding-bottom:calc(7px + var(--safe-bot))}
.emoji-row{display:flex;gap:2px;align-items:center}
.ebtn{background:none;border:none;font-size:21px;cursor:pointer;padding:3px 4px;border-radius:6px;line-height:1;-webkit-appearance:none}
.ebtn:active{transform:scale(1.35)}
.gift-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:1px 0}
.gift-strip::-webkit-scrollbar{display:none}
.gpill{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.2);border-radius:13px;padding:4px 10px;font-size:10px;white-space:nowrap;cursor:pointer;transition:all .13s;display:flex;align-items:center;gap:3px;font-family:'Exo 2'}
.gpill:active{background:rgba(245,158,11,.26);transform:scale(.94)}
.chat-row{display:flex;gap:6px;align-items:flex-end}
#chatInput{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--brd);border-radius:10px;padding:9px 11px;color:var(--txt);font-family:'Exo 2',sans-serif;font-size:14px;resize:none;transition:border-color .18s;max-height:78px;line-height:1.4;-webkit-appearance:none}
#chatInput:focus{outline:none;border-color:var(--acc2)}
#chatInput::placeholder{color:var(--mut)}
#sendBtn{flex-shrink:0;width:42px;height:42px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
#sendBtn:active{transform:scale(.9)}

/* ── NAV BAR ── */
#navBar{flex-shrink:0;height:var(--nav-h);background:rgba(8,10,20,.98);border-top:1px solid var(--brd);padding-bottom:var(--safe-bot);display:flex;align-items:stretch;backdrop-filter:blur(20px);transition:height .3s var(--anim),opacity .3s;overflow:hidden}
#navBar.hidden{height:0!important;opacity:0;pointer-events:none;border:none}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .16s;border:none;background:none;color:var(--mut);font-family:'Exo 2';position:relative;-webkit-appearance:none}
.nitem:active{background:rgba(124,58,237,.1)}
.nitem.on{color:var(--acc2)}
.ni{font-size:20px;line-height:1}
.nl{font-size:9px;font-weight:700;letter-spacing:.04em}
.nbadge{position:absolute;top:6px;right:calc(50% - 19px);background:var(--rose);color:#fff;border-radius:10px;font-size:8px;padding:1px 4px;font-weight:700;min-width:15px;text-align:center}

/* ── MODALS (bottom sheet) ── */
.moverlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s}
.moverlay.open{opacity:1;pointer-events:all}
.mbox{background:var(--surf2);border:1px solid var(--brd);border-radius:20px 20px 0 0;padding:18px 18px calc(18px + var(--safe-bot));width:100%;max-width:520px;box-shadow:0 -4px 50px rgba(124,58,237,.15);transform:translateY(100%);transition:transform .32s var(--anim);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.moverlay.open .mbox{transform:none}
.mhandle{width:34px;height:4px;background:rgba(255,255,255,.13);border-radius:4px;margin:0 auto 14px}
.mtitle{font-family:'Cinzel Decorative',serif;font-size:16px;background:linear-gradient(135deg,var(--acc2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.mfield{margin-bottom:11px}
.mfield label{display:block;font-size:9px;color:var(--mut);margin-bottom:5px;font-weight:700;letter-spacing:.08em;font-family:'Exo 2'}
.minput{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;color:var(--txt);font-family:'Exo 2',sans-serif;font-size:14px;-webkit-appearance:none}
.minput:focus{outline:none;border-color:var(--acc2)}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn{padding:11px 18px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .16s;border:none;-webkit-appearance:none}
.mbtn.p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.mbtn.p:active{transform:scale(.95)}
.mbtn.s{background:rgba(255,255,255,.08);color:var(--txt)}
.mbtn.s:active{background:rgba(255,255,255,.15)}
.ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:7px}
.gcell{text-align:center;padding:10px 6px;border-radius:10px;cursor:pointer;border:1.5px solid var(--brd);transition:all .14s;background:rgba(255,255,255,.022)}
.gcell:active{transform:scale(.9)}
.gcell.sel{border-color:var(--gold);background:rgba(245,158,11,.1)}
.ge{font-size:24px;line-height:1}.gn{font-size:9px;margin-top:3px;color:var(--mut)}
.crow{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.csw{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .13s,border-color .13s}
.csw:active{transform:scale(.85);border-color:var(--txt)}
.echips{display:flex;gap:6px;flex-wrap:wrap}
.echip{background:rgba(124,58,237,.1);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;transition:all .13s;font-family:'Exo 2'}
.echip.sel,.echip:active{background:rgba(124,58,237,.36);border-color:var(--acc2)}

/* ── EFFECTS ── */
#fxOverlay{position:fixed;inset:0;z-index:150;pointer-events:none;overflow:hidden}
.sparkle{position:absolute;animation:spk 2s ease-out forwards;pointer-events:none}
@keyframes spk{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(.2)}}
.cat-ent{position:absolute;display:flex;align-items:center;gap:9px;animation:catrun 3.5s ease-out forwards;top:28%;white-space:nowrap;filter:drop-shadow(0 0 14px rgba(168,85,247,.8))}
@keyframes catrun{0%{left:-200px;opacity:0}8%{opacity:1}48%{left:calc(50% - 80px)}70%{left:calc(50% - 80px)}90%{left:110vw;opacity:1}100%{left:110vw;opacity:0}}
.cat-e{font-size:34px;animation:catb .26s infinite alternate}
@keyframes catb{from{transform:translateY(0)}to{transform:translateY(-5px)}}
.cat-m{background:rgba(13,16,32,.95);border:2px solid var(--acc2);border-radius:10px;padding:7px 13px;font-family:'Cinzel Decorative',serif;font-size:12px;box-shadow:0 0 20px rgba(168,85,247,.3)}
.royal-ent{position:absolute;top:0;left:0;right:0;padding:14px;display:flex;flex-direction:column;align-items:center;gap:5px;animation:rdrop .45s var(--anim) forwards,rfade 1s 4.2s forwards;background:linear-gradient(180deg,rgba(13,16,32,.97) 0%,transparent 100%)}
@keyframes rdrop{from{transform:translateY(-100%)}to{transform:none}}
@keyframes rfade{from{opacity:1}to{opacity:0;pointer-events:none}}
.royal-t{font-family:'Cinzel Decorative',serif;font-size:22px;background:linear-gradient(135deg,#a855f7,#f59e0b,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.royal-cr{font-size:40px;animation:crsp .9s var(--anim)}
@keyframes crsp{from{transform:rotateY(0) scale(0)}to{transform:rotateY(360deg) scale(1)}}
.gift-burst{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;top:38%;left:50%;transform:translateX(-50%);animation:gp .36s var(--anim) forwards;text-align:center}
@keyframes gp{from{opacity:0;transform:translateX(-50%) scale(0)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.gbig{font-size:66px;animation:gspin .9s var(--anim)}
@keyframes gspin{from{transform:rotateY(0)}to{transform:rotateY(720deg)}}
.gtxt{font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--gold);padding:7px 14px;background:rgba(13,16,32,.92);border:1px solid rgba(245,158,11,.26);border-radius:9px;max-width:80vw}

/* ── NOTIFS ── */
#notifStack{position:fixed;top:calc(var(--header-h) + 8px + var(--safe-top));right:11px;z-index:400;display:flex;flex-direction:column;gap:5px;pointer-events:none;max-width:240px}
.notif{background:rgba(13,16,32,.97);border:1px solid var(--brd);border-radius:10px;padding:9px 12px;font-size:11px;font-family:'Exo 2';box-shadow:0 4px 14px rgba(0,0,0,.4);animation:nin .26s var(--anim);pointer-events:all}
@keyframes nin{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
.notif.out{animation:nout .26s var(--anim) forwards}
@keyframes nout{to{opacity:0;transform:translateX(22px)}}

/* ── DESKTOP ── */
@media(min-width:768px){
  #mainContent{flex-direction:row}
  #playerSection{height:auto!important;flex:1;flex-direction:column}
  #playerWrap{flex:1;position:relative}
  #chatSection{width:300px;flex-shrink:0;border-left:1px solid var(--brd)}
  #navBar{display:none}
}

/* Banned */
.banned-scr{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--rose);text-align:center;padding:20px}
</style>
</head>
<body>

<!-- LOADER -->
<div id="cinLoader">
  <div class="fstrip" id="filmStrip"></div>
  <div class="ltitle">CEKA-MAYA</div>
  <div class="lsub">FİLM KEYFİ YÜKLENIYOR</div>
  <div class="lbw"><div class="lb" id="loadBar"></div></div>
</div>

<!-- BG -->
<canvas id="bgCanvas"></canvas>
<div id="dynBg"></div>

<!-- JOIN -->
<div id="joinScreen">
  <div id="joinPtcls" style="position:absolute;inset:0;overflow:hidden;pointer-events:none"></div>
  <div class="join-logo">CEKA-MAYA<br><span style="font-size:.55em">Film Keyfi ♥️</span></div>
  <div class="join-sub">SİNEMA ODASI · GERÇEK ZAMANLI</div>
  <div class="join-card">
    <div>
      <label class="jlbl">KULLANICI ADI</label>
      <input class="jinput" id="joinName" placeholder="Adınızı girin..." maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div>
      <label class="jlbl">ROL</label>
      <div class="role-row">
        <div class="rcard sel" data-role="user" onclick="selRole('user')"><div class="re">🎬</div><div class="rl">İZLEYİCİ</div></div>
        <div class="rcard" data-role="admin" onclick="selRole('admin')"><div class="re">👑</div><div class="rl">YÖNETİCİ</div></div>
      </div>
    </div>
    <div id="welcomeBack" style="display:none"></div>
    <button class="jbtn" onclick="joinRoom()">✨ ODAYA GİR ✨</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header id="appHeader">
    <div class="logo">🎬 CEKA<span class="logo-heart">♥</span>MAYA</div>
    <div id="roomTitle">Film Keyfi</div>
    <div class="hact">
      <div class="lbadge"><div class="ldot"></div>CANLI</div>
      <span style="font-size:10px;color:var(--mut)">👥<span id="onlineCnt">0</span></span>
      <button class="hbtn" id="adminBtn" style="display:none" onclick="openModal('adminModal')">⚙️</button>
      <button class="hbtn danger" onclick="leaveRoom()">✖</button>
    </div>
  </header>

  <div id="mainContent">
    <!-- PLAYER -->
    <div id="playerSection">
      <div id="playerWrap">
        <div class="ph" id="placeholder">
          <div class="ph-ico">🎬</div>
          <div class="ph-txt">Video bekleniyor...</div>
        </div>
      </div>
      <div id="sugBar">
        <span class="sug-lbl">📺</span>
        <div id="sugList" style="display:flex;gap:6px"></div>
      </div>
      <div id="vidBar">
        <input id="urlInput" type="url" placeholder="YouTube, ok.ru, Rutube, MP4 URL..." inputmode="url"/>
        <button class="vbtn" onclick="loadUrl()">▶</button>
        <button class="vbtn" onclick="doSync()">⟳</button>
        <span class="pbadge by" id="vBadge" style="display:none">YT</span>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chatSection">
      <div class="tabs">
        <div class="tab on" onclick="switchTab('chat')">💬 SOHBET</div>
        <div class="tab" onclick="switchTab('users')">👥 ODA</div>
        <div class="tab" onclick="switchTab('seats')">🛋️ KOLTUK</div>
      </div>
      <div id="chatBody"></div>
      <div id="usersPanel"></div>
      <div id="seatsPanel"><div class="seats-grid" id="seatsGrid"></div></div>
      <div class="cinput">
        <div class="emoji-row">
          <button class="ebtn" onclick="ae('😂')">😂</button>
          <button class="ebtn" onclick="ae('❤️')">❤️</button>
          <button class="ebtn" onclick="ae('🔥')">🔥</button>
          <button class="ebtn" onclick="ae('👏')">👏</button>
          <button class="ebtn" onclick="ae('🎬')">🎬</button>
          <button class="ebtn" onclick="ae('⭐')">⭐</button>
          <button class="ebtn" onclick="ae('🍿')">🍿</button>
          <button class="ebtn" style="margin-left:auto;font-size:18px" onclick="openModal('giftModal')">🎁</button>
        </div>
        <div class="gift-strip" id="quickGifts"></div>
        <div class="chat-row">
          <textarea id="chatInput" placeholder="Mesaj... (Enter = gönder)" rows="1"></textarea>
          <button id="sendBtn" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav id="navBar">
    <button class="nitem on" id="nt-video" onclick="navTo('video')">
      <span class="ni">🎬</span><span class="nl">VİDEO</span>
    </button>
    <button class="nitem" id="nt-chat" onclick="navTo('chat')" style="position:relative">
      <span class="ni">💬</span><span class="nl">SOHBET</span>
      <span class="nbadge" id="chatBadge" style="display:none">0</span>
    </button>
    <button class="nitem" id="nt-users" onclick="navTo('users')">
      <span class="ni">👥</span><span class="nl">ODA</span>
    </button>
    <button class="nitem" id="nt-gift" onclick="openModal('giftModal')">
      <span class="ni">🎁</span><span class="nl">HEDİYE</span>
    </button>
  </nav>
</div>

<!-- GIFT MODAL -->
<div class="moverlay" id="giftModal" onclick="closeModal('giftModal')">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mtitle">🎁 Hediye Gönder</div>
    <div class="mfield"><label>ALICI</label><select class="minput" id="giftRcv"></select></div>
    <div class="mfield"><label>HEDİYE</label><div class="ggrid" id="giftGrid"></div></div>
    <div class="mactions">
      <button class="mbtn s" onclick="closeModal('giftModal')">İptal</button>
      <button class="mbtn p" onclick="doSendGift()">🎁 Gönder</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="moverlay" id="adminModal" onclick="closeModal('adminModal')">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhandle"></div>
    <div class="mtitle">⚙️ Oda Yönetimi</div>
    <div class="mfield"><label>ODA ADI</label><input class="minput" id="adRoomName" value="CEKA-MAYA Film Keyfi ♥️"/></div>
    <div class="mfield"><label>ARKA PLAN</label><input class="minput" id="adBgUrl" placeholder="https://... veya #renk"/><div class="crow" id="colorRow"></div></div>
    <div class="mfield"><label>GİRİŞ EFEKTİ</label><div class="echips" id="effectChips"></div></div>
    <div class="mactions">
      <button class="mbtn s" onclick="closeModal('adminModal')">İptal</button>
      <button class="mbtn p" onclick="applyAdmin()">✓ Uygula</button>
    </div>
  </div>
</div>

<div id="fxOverlay"></div>
<div id="notifStack"></div>

<script>
/* ──────────────────────────────────
   URL PARAMS
────────────────────────────────── */
const QP=new URLSearchParams(location.search);
const SHOW_BAR =QP.get('showBar')!=='0';
const SHOW_NAV =QP.get('showNavigation')!=='false';
const H_PCT    =parseInt(QP.get('heightPercent'))||55;
document.documentElement.style.setProperty('--player-pct',H_PCT+'%');

/* ──────────────────────────────────
   CONSTANTS
────────────────────────────────── */
const GIFTS=[
  {name:'Gül',e:'🌹'},{name:'Kalp',e:'❤️'},{name:'Taç',e:'👑'},
  {name:'Yıldız',e:'⭐'},{name:'Elmas',e:'💎'},{name:'Ateş',e:'🔥'},
  {name:'Kedi',e:'🐱'},{name:'Çiçek',e:'🌸'},{name:'Popcorn',e:'🍿'},
  {name:'Film',e:'🎬'},{name:'Balon',e:'🎈'},{name:'Roket',e:'🚀'},
];
const BG_COLORS=['#080a14','#0f0a1e','#0a1628','#0e1a12','#1a0a0a','#0d0d0d','#1a1200','#0a1a1a'];
const EFFECTS=[{id:'royal_entrance',lbl:'👑 Kraliyet'},{id:'cat_run',lbl:'🐱 Kedi'},{id:'sparkle_rain',lbl:'✨ Işıltı'},{id:'normal_entrance',lbl:'🎉 Normal'}];
const YT_SUGG=[
  {id:'jNQXAC9IVRw',t:'Me at the zoo',e:'🦁'},{id:'kJQP7kiw5Fk',t:'Despacito',e:'🎵'},
  {id:'fJ9rUzIMcZQ',t:'Bohemian Rhapsody',e:'🎸'},{id:'9bZkp7q19f0',t:'Gangnam Style',e:'🕺'},
  {id:'RgKAFK5djSk',t:'Waka Waka',e:'⚽'},
];
const LS_KEY='ceka_maya_user_v2';

/* ──────────────────────────────────
   STATE
────────────────────────────────── */
let me={username:'',tur:'user'};
let ws=null,videoState=null,users=[],isAdmin=false;
let selGift=null,selEffect='royal_entrance';
let curTab='chat',curNav='video',unreadChat=0;
let localVid=null,ytSyncIv=null;

/* ──────────────────────────────────
   LOADER
────────────────────────────────── */
(function(){
  const s=document.getElementById('filmStrip');
  for(let i=0;i<9;i++){const h=document.createElement('div');h.className='fh';s.appendChild(h);}
  const bar=document.getElementById('loadBar');
  let p=0;const iv=setInterval(()=>{p+=Math.random()*18;if(p>=100){p=100;clearInterval(iv);}bar.style.width=p+'%';},180);
  setTimeout(()=>{
    document.getElementById('cinLoader').classList.add('out');
    initBg();initParticles();checkSaved();
  },1900);
})();

/* ──────────────────────────────────
   LOCALSTORAGE
────────────────────────────────── */
function checkSaved(){
  try{
    const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(d.username){
      document.getElementById('joinName').value=d.username;
      selRole(d.tur||'user');
      const wb=document.getElementById('welcomeBack');
      wb.style.display='block';
      wb.textContent=`👋 Tekrar hoş geldin, ${d.username}!`;
    }
  }catch(e){}
}
function saveUser(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({username:me.username,tur:me.tur}));}catch(e){}
}

/* ──────────────────────────────────
   BG
────────────────────────────────── */
function initBg(){
  const c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  let W,H;const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
  resize();addEventListener('resize',resize);
  const stars=Array.from({length:130},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,a:Math.random(),da:Math.random()*.016-.008,dx:Math.random()*.07-.035,dy:Math.random()*.035-.017}));
  (function draw(){
    ctx.fillStyle='rgba(8,10,20,.2)';ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.x+=s.dx;s.y+=s.dy;s.a+=s.da;if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;if(s.a<0)s.da=Math.abs(s.da);if(s.a>1)s.da=-Math.abs(s.da);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,170,255,${s.a*.6})`;ctx.fill();});
    requestAnimationFrame(draw);
  })();
}
function initParticles(){
  const c=document.getElementById('joinPtcls');
  for(let i=0;i<22;i++){const p=document.createElement('div');p.className='jp';const sz=Math.random()*5+2;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${5+Math.random()*9}s;animation-delay:${Math.random()*7}s;background:hsl(${250+Math.random()*60},70%,65%)`;c.appendChild(p);}
}

/* ──────────────────────────────────
   JOIN
────────────────────────────────── */
function selRole(role){me.tur=role;document.querySelectorAll('.rcard').forEach(c=>c.classList.toggle('sel',c.dataset.role===role));}
function joinRoom(){
  const name=document.getElementById('joinName').value.trim();
  if(!name){document.getElementById('joinName').style.borderColor='var(--rose)';return;}
  me.username=name;isAdmin=(me.tur==='admin');
  saveUser();
  const js=document.getElementById('joinScreen');js.classList.add('out');
  setTimeout(()=>{
    js.style.display='none';
    document.getElementById('app').style.display='flex';
    if(!SHOW_BAR)document.getElementById('appHeader').classList.add('hidden');
    if(!SHOW_NAV)document.getElementById('navBar').classList.add('hidden');
    if(isAdmin)document.getElementById('adminBtn').style.display='';
    initUI();connectWS();
  },440);
}
document.getElementById('joinName').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});

/* ──────────────────────────────────
   UI INIT
────────────────────────────────── */
function initUI(){
  // Seats
  const sg=document.getElementById('seatsGrid');
  const se=['🛋️','🪑','🛌','💺','🪑','🛋️','💺','🪑','🛌'];
  for(let i=1;i<=9;i++){const s=document.createElement('div');s.className='seat';s.id='seat'+i;s.dataset.seat=i;s.innerHTML=`<div>${se[i-1]}</div><div class="seat-lbl">KOLTUK ${i}</div>`;s.onclick=()=>takeSeat(i);sg.appendChild(s);}
  // Gift grid
  const gg=document.getElementById('giftGrid');
  GIFTS.forEach(g=>{const d=document.createElement('div');d.className='gcell';d.innerHTML=`<div class="ge">${g.e}</div><div class="gn">${g.name}</div>`;d.onclick=()=>{document.querySelectorAll('.gcell').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');selGift=g;};gg.appendChild(d);});
  // Quick gifts
  const qg=document.getElementById('quickGifts');
  GIFTS.slice(0,5).forEach(g=>{const p=document.createElement('div');p.className='gpill';p.innerHTML=`${g.e} ${g.name}`;p.onclick=()=>quickGift(g);qg.appendChild(p);});
  // Suggestions
  const sl=document.getElementById('sugList');
  YT_SUGG.forEach(v=>{const c=document.createElement('div');c.className='sug-chip';c.textContent=`${v.e} ${v.t}`;c.onclick=()=>{if(!isAdmin){showNotif('⚠️ Sadece admin');return;}changeVid({video_id:v.id,video_type:'youtube',title:v.t});};sl.appendChild(c);});
  // Color swatches
  const cr=document.getElementById('colorRow');
  BG_COLORS.forEach(col=>{const s=document.createElement('div');s.className='csw';s.style.background=col;s.onclick=()=>document.getElementById('adBgUrl').value=col;cr.appendChild(s);});
  // Effect chips
  const ec=document.getElementById('effectChips');
  EFFECTS.forEach(ef=>{const ch=document.createElement('div');ch.className='echip'+(ef.id===selEffect?' sel':'');ch.textContent=ef.lbl;ch.onclick=()=>{document.querySelectorAll('.echip').forEach(x=>x.classList.remove('sel'));ch.classList.add('sel');selEffect=ef.id;};ec.appendChild(ch);});
  // Swipe down modals
  document.querySelectorAll('.mbox').forEach(box=>{
    let sy=0;
    box.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
    box.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>75){const ov=box.closest('.moverlay');if(ov)ov.classList.remove('open');}},{passive:true});
  });
  // Chat input
  const ci=document.getElementById('chatInput');
  ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
  ci.addEventListener('input',()=>{ci.style.height='auto';ci.style.height=Math.min(ci.scrollHeight,78)+'px';});
  document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadUrl();});
  // Default mobile view
  if(innerWidth<768)navTo('video');
}

/* ──────────────────────────────────
   MOBILE NAV
────────────────────────────────── */
function navTo(sec){
  curNav=sec;
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));
  const btn=document.getElementById('nt-'+sec);if(btn)btn.classList.add('on');
  if(innerWidth<768){
    const ps=document.getElementById('playerSection'),cs=document.getElementById('chatSection');
    if(sec==='video'){ps.style.display='flex';cs.style.display='none';}
    else{ps.style.display='none';cs.style.display='flex';if(sec==='chat'){switchTab('chat');unreadChat=0;updBadge();}if(sec==='users'){switchTab('users');}}
  }
}
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['chat','users','seats'][i]===tab));
  document.getElementById('chatBody').style.display=tab==='chat'?'flex':'none';
  document.getElementById('usersPanel').classList.toggle('on',tab==='users');
  document.getElementById('seatsPanel').classList.toggle('on',tab==='seats');
  if(tab==='chat'){unreadChat=0;updBadge();}
}
function updBadge(){const b=document.getElementById('chatBadge');b.style.display=unreadChat>0?'block':'none';b.textContent=unreadChat>99?'99+':unreadChat;}

/* ──────────────────────────────────
   WEBSOCKET
────────────────────────────────── */
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{send({type:'join',username:me.username,tur:me.tur});startPing();};
  ws.onclose=()=>{setTimeout(connectWS,3000);};
  ws.onerror=()=>{};
  ws.onmessage=e=>{let d;try{d=JSON.parse(e.data);}catch{return;}onMsg(d);};
}
function onMsg(d){
  switch(d.type){
    case 'init':applyVid(d.videoState);d.chat.forEach(m=>renderMsg(m,false));scrollChat();updUsers(d.users);applyRoom(d.roomSettings);break;
    case 'chat':renderMsg(d.message,true);scrollChat();if(curNav!=='chat'||curTab!=='chat'){unreadChat++;updBadge();}break;
    case 'video_sync':applySync(d.videoState);break;
    case 'video_change':applyVid(d.videoState);break;
    case 'users':updUsers(d.users);break;
    case 'effect':showFx(d.effect);break;
    case 'room_settings':applyRoom(d.settings);break;
    case 'banned':document.body.innerHTML='<div class="banned-scr">🚫 Banlandınız</div>';break;
  }
}
let pingIv;
function startPing(){clearInterval(pingIv);pingIv=setInterval(()=>{if(ws&&ws.readyState===1)send({type:'ping'});},20000);}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}

/* ──────────────────────────────────
   VIDEO
────────────────────────────────── */
function applyVid(vs){
  if(!vs)return;videoState=vs;
  document.getElementById('placeholder').style.display='none';
  const b=document.getElementById('vBadge');b.style.display='';
  const t=vs.video_type||'youtube';
  if(t==='youtube'){b.className='pbadge by';b.textContent='YT';loadYT(vs.video_id,vs.time,vs.is_playing);}
  else if(t==='okru'){b.className='pbadge bok';b.textContent='OK.RU';loadOkRu(vs.video_url);}
  else if(t==='rutube'){b.className='pbadge bok';b.textContent='RUTUBE';loadRutube(vs.video_id);}
  else if(t==='twitch'){b.className='pbadge btwitch';b.textContent='TWITCH';loadTwitch(vs.video_url);}
  else if(t==='mp4'){b.className='pbadge bmp4';b.textContent='MP4';loadMp4(vs.video_url,vs.time,vs.is_playing);}
  else{b.className='pbadge bmp4';b.textContent='WEB';loadIframe(vs.video_url);}
}
function applySync(vs){
  if(!vs||!videoState)return;videoState=vs;
  if(localVid){const df=Math.abs(localVid.currentTime-vs.time);if(df>3)localVid.currentTime=vs.time;if(vs.is_playing&&localVid.paused)localVid.play().catch(()=>{});if(!vs.is_playing&&!localVid.paused)localVid.pause();}
}
function clearP(){
  clearInterval(ytSyncIv);
  const pw=document.getElementById('playerWrap');
  Array.from(pw.children).forEach(c=>{if(c.id!=='placeholder')pw.removeChild(c);});
  localVid=null;
}
function loadYT(vid,t=0,play=true){
  clearP();
  fetch(`/ytproxy?v=${vid}`).then(r=>r.json()).then(d=>{
    const ifr=document.createElement('iframe');
    ifr.src=`https://www.youtube.com/embed/${vid}?autoplay=${play?1:0}&start=${Math.floor(t)}&rel=0&modestbranding=1&playsinline=1`;
    ifr.allow='autoplay;fullscreen;picture-in-picture';ifr.allowFullscreen=true;
    ifr.setAttribute('playsinline','');
    ifr.onerror=()=>{ifr.src=d.primary;};
    document.getElementById('playerWrap').appendChild(ifr);
    if(isAdmin)startYtSync(t,play);
  }).catch(()=>{
    const ifr=document.createElement('iframe');
    ifr.src=`https://www.youtube.com/embed/${vid}?autoplay=${play?1:0}&start=${Math.floor(t)}&rel=0&playsinline=1`;
    ifr.allow='autoplay;fullscreen';ifr.allowFullscreen=true;
    document.getElementById('playerWrap').appendChild(ifr);
  });
}
function startYtSync(t,play){clearInterval(ytSyncIv);let ti=t;ytSyncIv=setInterval(()=>{ti+=2;send({type:'video_sync',videoState:{...videoState,time:ti,is_playing:play}});},2000);}
function loadOkRu(url){clearP();const m=url.match(/ok\.ru\/video\/(\d+)/);const src=m?`https://ok.ru/videoembed/${m[1]}`:url;const ifr=document.createElement('iframe');ifr.src=src;ifr.allow='autoplay;fullscreen';ifr.allowFullscreen=true;document.getElementById('playerWrap').appendChild(ifr);}
function loadRutube(vid){clearP();const ifr=document.createElement('iframe');ifr.src=`https://rutube.ru/play/embed/${vid}`;ifr.allow='clipboard-write;autoplay;fullscreen';ifr.allowFullscreen=true;document.getElementById('playerWrap').appendChild(ifr);}
function loadTwitch(url){clearP();const m=url.match(/twitch\.tv\/([a-zA-Z0-9_]+)/);if(m){const ifr=document.createElement('iframe');ifr.src=`https://player.twitch.tv/?channel=${m[1]}&parent=${location.hostname}`;ifr.allow='autoplay;fullscreen';ifr.allowFullscreen=true;document.getElementById('playerWrap').appendChild(ifr);}else loadIframe(url);}
function loadMp4(url,t=0,play=true){clearP();const v=document.createElement('video');v.src=url;v.controls=true;v.autoplay=play;v.currentTime=t;v.setAttribute('playsinline','');v.setAttribute('webkit-playsinline','');v.style.cssText='position:absolute;inset:0;width:100%;height:100%;background:#000';localVid=v;if(isAdmin){v.addEventListener('play',bcastV);v.addEventListener('pause',bcastV);v.addEventListener('seeked',bcastV);}document.getElementById('playerWrap').appendChild(v);}
function loadIframe(url){clearP();const ifr=document.createElement('iframe');ifr.src=url;ifr.allow='autoplay;fullscreen;picture-in-picture';ifr.allowFullscreen=true;ifr.sandbox='allow-scripts allow-same-origin allow-forms allow-popups allow-presentation';document.getElementById('playerWrap').appendChild(ifr);}
function bcastV(){if(!localVid||!isAdmin)return;send({type:'video_sync',videoState:{...videoState,time:localVid.currentTime,is_playing:!localVid.paused}});}
function loadUrl(){
  if(!isAdmin){showNotif('⚠️ Sadece admin');return;}
  const raw=document.getElementById('urlInput').value.trim();if(!raw)return;
  fetch(`/api/url-meta?url=${encodeURIComponent(raw)}`).then(r=>r.json()).then(m=>{changeVid({video_id:m.video_id||'',video_type:m.type||'iframe',video_url:m.video_url||raw,title:m.title||'Video'});}).catch(()=>{if(/\.(mp4|webm|ogg)(\?|$)/i.test(raw))changeVid({video_type:'mp4',video_url:raw,title:'Video'});else changeVid({video_type:'iframe',video_url:raw,title:'Video'});});
}
function changeVid(opts){if(!isAdmin)return;send({type:'video_change',...opts});applyVid({...opts,time:0,is_playing:true});}
function doSync(){if(videoState)applyVid(videoState);showNotif('⟳ Senkronize edildi');}

/* ──────────────────────────────────
   CHAT
────────────────────────────────── */
function sendChat(){const ci=document.getElementById('chatInput');const m=ci.value.trim();if(!m)return;send({type:'chat',message:m});ci.value='';ci.style.height='';}
function ae(e){const ci=document.getElementById('chatInput');ci.value+=e;ci.focus();}
function renderMsg(m,anim=true){
  const body=document.getElementById('chatBody');
  const d=document.createElement('div');
  const sys=m.message_type==='system',gift=m.message_type==='gift',mine=m.username===me.username;
  d.className=`cmsg ${sys?'sys':gift?'gift':mine?'mine':'norm'}`;
  if(!anim)d.style.animation='none';
  if(!sys)d.innerHTML=`<span class="mauth ${m.tur||'user'}">${getRE(m.tur)}${esc(m.username)}</span><span class="mtxt">${esc(m.message)}</span>`;
  else d.textContent=m.message;
  body.appendChild(d);
  if(body.children.length>200)body.removeChild(body.firstChild);
}
function scrollChat(){const b=document.getElementById('chatBody');b.scrollTop=b.scrollHeight;}
function getRE(t){return t==='admin'?'👑 ':t==='vip'?'⭐ ':'';}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ──────────────────────────────────
   USERS
────────────────────────────────── */
function updUsers(list){
  users=list;document.getElementById('onlineCnt').textContent=list.length;
  const up=document.getElementById('usersPanel');up.innerHTML='';
  list.forEach(u=>{
    const d=document.createElement('div');d.className=`ucard ${u.tur}`;
    d.innerHTML=`<div class="uav">${u.tur==='admin'?'👑':u.tur==='vip'?'⭐':'🎬'}</div>
    <div class="uinfo"><div class="uname">${esc(u.username)}</div><div class="umeta"><span class="lvl">Lv${u.level||1}</span>${u.is_muted?'🔇':''}</div></div>
    ${isAdmin&&u.username!==me.username?`<div class="uacts"><button class="uab" onclick="event.stopPropagation();send({type:'mute_user',username:'${esc(u.username)}'})">${u.is_muted?'🔊':'🔇'}</button><button class="uab" style="color:var(--rose)" onclick="event.stopPropagation();if(confirm('Ban?'))send({type:'ban_user',username:'${esc(u.username)}'})">🚫</button></div>`:''}`;
    up.appendChild(d);
  });
  const gr=document.getElementById('giftRcv');gr.innerHTML='';
  list.filter(u=>u.username!==me.username).forEach(u=>{const o=document.createElement('option');o.value=u.username;o.textContent=u.username;gr.appendChild(o);});
  for(let i=1;i<=9;i++){
    const s=document.getElementById('seat'+i);if(!s)continue;
    const occ=list.find(u=>u.seat_number===i);
    s.querySelectorAll('.seat-usr').forEach(x=>x.remove());
    s.classList.remove('occ','mine');
    if(occ){s.classList.add('occ');if(occ.username===me.username)s.classList.add('mine');const su=document.createElement('div');su.className='seat-usr';su.textContent=occ.username;s.appendChild(su);}
  }
}
function takeSeat(n){const occ=users.find(u=>u.seat_number===n);if(occ&&occ.username!==me.username)return;send({type:'take_seat',seat:n});}

/* ──────────────────────────────────
   GIFTS
────────────────────────────────── */
function doSendGift(){if(!selGift){showNotif('Hediye seçin!');return;}const rcv=document.getElementById('giftRcv').value;if(!rcv){showNotif('Alıcı seçin!');return;}send({type:'gift',receiver:rcv,gift_name:selGift.name,gift_emoji:selGift.e});closeModal('giftModal');selGift=null;}
function quickGift(g){const t=users.find(u=>u.username!==me.username);if(!t){showNotif('Odada başka kullanıcı yok');return;}send({type:'gift',receiver:t.username,gift_name:g.name,gift_emoji:g.e});showNotif(`${g.e} → ${t.username}`);}

/* ──────────────────────────────────
   EFFECTS
────────────────────────────────── */
function showFx(fx){let d;try{d=JSON.parse(fx.effect_data);}catch{return;}const t=fx.effect_type;if(t==='gift')showGiftFx(d);else if(t==='royal_entrance'||t==='sparkle_rain')showRoyal(d);else showCat(d);}
function showRoyal(d){const ov=document.getElementById('fxOverlay');sparkles(ov,26);const el=document.createElement('div');el.className='royal-ent';el.innerHTML=`<div class="royal-cr">👑</div><div class="royal-t">${esc(d.username)}</div><div style="color:var(--mut);font-family:Exo 2;font-size:11px">odaya katıldı!</div>`;ov.appendChild(el);setTimeout(()=>ov.contains(el)&&ov.removeChild(el),5200);}
function showCat(d){const ov=document.getElementById('fxOverlay');const el=document.createElement('div');el.className='cat-ent';el.innerHTML=`<div class="cat-e">🐱</div><div class="cat-m">${esc(d.message||d.username+' geldi!')}</div>`;ov.appendChild(el);setTimeout(()=>ov.contains(el)&&ov.removeChild(el),3600);}
function showGiftFx(d){const ov=document.getElementById('fxOverlay');sparkles(ov,20);const el=document.createElement('div');el.className='gift-burst';el.innerHTML=`<div class="gbig">${d.gift_emoji||'🎁'}</div><div class="gtxt">🎁 ${esc(d.sender)} → ${esc(d.receiver)}<br>${esc(d.gift_name)}</div>`;ov.appendChild(el);setTimeout(()=>ov.contains(el)&&ov.removeChild(el),4600);}
function sparkles(c,n=16){const em=['✨','⭐','🌟','💫'];for(let i=0;i<n;i++){const s=document.createElement('div');s.className='sparkle';s.textContent=em[Math.floor(Math.random()*em.length)];s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*1.1}s;font-size:${10+Math.random()*13}px`;c.appendChild(s);setTimeout(()=>c.contains(s)&&c.removeChild(s),2600);}}

/* ──────────────────────────────────
   ADMIN
────────────────────────────────── */
function applyAdmin(){const settings={room_name:document.getElementById('adRoomName').value||'CEKA-MAYA',background_image:document.getElementById('adBgUrl').value,entrance_effect:selEffect};send({type:'update_room_settings',settings});closeModal('adminModal');showNotif('✓ Ayarlar güncellendi');}
function applyRoom(s){if(!s)return;document.getElementById('roomTitle').textContent=s.room_name||'Film Keyfi';const bg=document.getElementById('dynBg');if(s.background_gif){bg.style.backgroundImage=`url(${s.background_gif})`;bg.style.backgroundColor='';}else if(s.background_image&&s.background_image.startsWith('http')){bg.style.backgroundImage=`url(${s.background_image})`;bg.style.backgroundColor='';}else if(s.background_image&&s.background_image.startsWith('#')){bg.style.backgroundColor=s.background_image;bg.style.backgroundImage='';}else{bg.style.background='';}}

/* ──────────────────────────────────
   MODALS
────────────────────────────────── */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.moverlay.open').forEach(m=>m.classList.remove('open'));});

/* ──────────────────────────────────
   NOTIFS
────────────────────────────────── */
function showNotif(msg,dur=2600){const s=document.getElementById('notifStack');const n=document.createElement('div');n.className='notif';n.textContent=msg;s.appendChild(n);setTimeout(()=>{n.classList.add('out');setTimeout(()=>s.contains(n)&&s.removeChild(n),280);},dur);}

/* ──────────────────────────────────
   MISC
────────────────────────────────── */
function leaveRoom(){if(ws)ws.close();location.reload();}
addEventListener('beforeunload',()=>{if(ws)ws.close();});
addEventListener('resize',()=>{if(innerWidth>=768){document.getElementById('playerSection').style.display='';document.getElementById('chatSection').style.display='';}else navTo(curNav);});
</script>
</body>
